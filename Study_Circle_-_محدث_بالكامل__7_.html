    <style>
        body {
            font-family: 'Cairo', 'Inter', sans-serif;
            font-weight: 500;
        }
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
        /* مظهر ورقة الدفتر المخططة لشاشة الكتابة */
        .notebook-paper {
            background-color: #fcfcfc;
            background-image: linear-gradient(#e1e1e1 1px, transparent 1px);
            background-size: 100% 2rem;
            line-height: 2rem;
        }
        /* شريط تمرير أفقي أنحف لصفوف الوحدات والقواعد */
        .thin-scroll::-webkit-scrollbar { height: 6px; }
        .thin-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        /* لوحة الرسم/التعليق بالقلم أو الإصبع */
        .draw-canvas { touch-action: none; cursor: crosshair; }
    </style>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ============ مزامنة سحابية مع Firestore ============
        // uid المستخدم الحالي (يُحدَّث من AuthGate عند تسجيل الدخول/الخروج)
        let cloudUid = null;
        let pendingCloudData = {};
        let cloudSyncTimer = null;

        function scheduleCloudSync(key, value) {
            if (!cloudUid) return; // لا يوجد مستخدم مسجل دخول بعد
            pendingCloudData[key] = value;
            if (cloudSyncTimer) clearTimeout(cloudSyncTimer);
            cloudSyncTimer = setTimeout(() => {
                const dataToSend = pendingCloudData;
                pendingCloudData = {};
                firebase.firestore().collection('users').doc(cloudUid).set(dataToSend, { merge: true })
                    .catch(err => console.error('تعذرت المزامنة السحابية (قد يكون حجم الملفات كبيراً جداً):', err));
            }, 1500);
        }

        function translateAuthError(err) {
            const code = err && err.code;
            const map = {
                'auth/email-already-in-use': 'هذا البريد مستخدم مسبقاً. جرّب تسجيل الدخول بدلاً من إنشاء حساب.',
                'auth/invalid-email': 'صيغة البريد الإلكتروني غير صحيحة.',
                'auth/weak-password': 'كلمة المرور ضعيفة، استخدم 6 أحرف على الأقل.',
                'auth/user-not-found': 'لا يوجد حساب بهذا البريد.',
                'auth/wrong-password': 'كلمة المرور غير صحيحة.',
                'auth/invalid-credential': 'بيانات الدخول غير صحيحة.',
                'auth/popup-closed-by-user': 'تم إغلاق نافذة جوجل قبل إكمال الدخول.',
                'auth/network-request-failed': 'تحقق من اتصالك بالإنترنت وحاول مرة أخرى.',
            };
            return (code && map[code]) || 'حدث خطأ غير متوقع، حاول مرة أخرى.';
        }

        // حفظ آمن في localStorage - يمنع انهيار التطبيق إذا امتلأت المساحة (مثلاً بسبب ملفات PDF/صور كبيرة)
        // كما يجدول مزامنة النسخة نفسها إلى Firestore إذا كان هناك مستخدم مسجل دخول
        function safeSetLocalStorage(key, value) {
            let ok = true;
            try {
                localStorage.setItem(key, value);
            } catch (err) {
                console.error('تعذر حفظ البيانات محلياً (قد تكون المساحة ممتلئة):', key, err);
                ok = false;
            }
            scheduleCloudSync(key, value);
            return ok;
        }

        // ==========================================
        // 1. ENGINE / SCHEDULER: Spaced Repetition System (SRS)
        // ==========================================
        class SRSScheduler {
            static calculate(card, grade) {
                // Grade: 1 (Again), 2 (Hard), 3 (Good), 4 (Easy)
                let { easeFactor, interval, repetitions, state, lapses } = card;
                let nextState = state;
                let nextLapses = lapses;

                if (grade === 1) { // Again
                    nextState = 'Relearning';
                    easeFactor = Math.max(1.3, easeFactor - 0.2);
                    nextLapses += 1;
                    interval = 1; // 1 minute/day depending on scale
                    repetitions = 0;
                } else if (grade === 2) { // Hard
                    easeFactor = Math.max(1.3, easeFactor - 0.15);
                    interval = state === 'New' ? 1 : Math.ceil(interval * 1.2);
                    repetitions += 1;
                    nextState = 'Review';
                } else if (grade === 3) { // Good
                    if (state === 'New' || state === 'Learning' || state === 'Relearning') {
                        interval = repetitions === 0 ? 1 : repetitions === 1 ? 6 : Math.ceil(interval * easeFactor);
                        repetitions += 1;
                        nextState = 'Review';
                    } else {
                        interval = Math.ceil(interval * easeFactor);
                        repetitions += 1;
                    }
                } else if (grade === 4) { // Easy
                    easeFactor = easeFactor + 0.15;
                    interval = state === 'New' ? 4 : Math.ceil(interval * easeFactor * 1.3);
                    repetitions += 1;
                    nextState = 'Review';
                }

                const dueDate = new Date();
                dueDate.setDate(dueDate.getDate() + interval);

                return {
                    easeFactor: parseFloat(easeFactor.toFixed(2)),
                    interval,
                    repetitions,
                    lapses: nextLapses,
                    state: nextState,
                    dueDate: dueDate.toISOString()
                };
            }
        }

            "أكثر من مليار ونصف شخص يستخدم الإنجليزية حول العالم.",
            "الإنجليزية هي لغة الإنترنت الأولى بنسبة تتجاوز 55%.",
            "معظم الأبحاث والمنشورات العلمية الحديثة تُكتب بالإنجليزية أولاً.",
            "الاستمرار اليومي ولو لـ 10 دقائق يصنع فارقاً مهولاً بعد عام.",
            "قليل دائم خير من كثير منقطع.",
            "كل كلمة جديدة تتعلمها تفتح لك باباً جديداً لفهم العالم.",
            "الإنجليزية تضاعف فرص قبولك في الوظائف العالمية الكبرى.",
            "تستطيع السفر لأكثر من 100 دولة دون القلق من حاجز اللغة.",
            "تعلم الإنجليزية يمرن الدماغ ويحميه من الشيخوخة الذهنية.",
            "الذكاء الاصطناعي يتلقى الأوامر وينتج أفضل النتائج بالإنجليزية.",
            "لا تقارن بدايتك بمواسم حصاد الآخرين، ركز على خطوتك القادمة فقط.",
            "الأخطاء هي الدليل الأكبر على أنك تحاول وتتقدم.",
            "حفظ 5 كلمات يومياً يعني 1825 كلمة جديدة في السنة!",
            "أقوى قنوات يوتيوب التعليمية والوثائقية متوفرة بالإنجليزية فقط.",
            "عقل الإنسان مهيأ طبيعياً لتعلم أي لغة في أي عمر.",
            "التحدث بطلاقة ليس موهبة بل مهارة تكتسب بالتدريب المستمر.",
            "مشاهدة دقيقة واحدة من فيلم إنجليزي بدون ترجمة تفيد مهارة الاستماع لديك.",
            "كل فنان ومبرمج وكاتب عظيم يعتمد على الإنجليزية لتوسيع أفقه.",
            "عشر دقائق من التركيز التام أفضل من ساعتين من التشتت.",
            "اللغة ليست مادة دراسية بل وسيلة حياة وتواصل.",
            "ابدأ اليوم، فبعد سنة من الآن ستتمنى لو أنك بدأت اليوم.",
            "كل مراجعة تقوم بها تبني مسارات عصبية جديدة في دماغك.",
            "كل نكسة أو يوم تتدرب فيه قليلاً هو جزء من رحلة الطلاقة.",
            "تذكر دائماً لماذا بدأت؛ العالم ينتظرك لتكتشفه.",
            "الطلاقة لا تعني الخلو من الأخطاء، بل القدرة على إيصال فكرتك بثقة.",
            "اللغة الإنجليزية لغة مرنة، تسهل عملية التعبير عما بداخلك.",
            "التعلم الذاتي هو المفتاح الحقيقي لتطوير مستقبلك.",
            "كل يوم تقوم فيه بمراجعة الكلمات يقربك خطوة إضافية من أحلامك.",
            "القراءة اليومية تزيد حصيلتك اللغوية أسرع بثلاث مرات من الحفظ المجرد.",
            "الكتابة تساعدك على ترتيب أفكارك وبناء الجمل بشكل صحيح وتلقائي.",
            "استمع كثيراً، فالمستمع الجيد يصبح متحدثاً ممتازاً بالتبعية.",
            "تأثير التراكم المعرفي شبيه بكرة الثلج، يبدأ صغيراً ثم يكتسح.",
            "تعلم اللغة هو استثمارك الأضمن للمستقبل المهني والشخصي.",
            "الفارق الوحيد بين المتقن للمبتدئ هو الالتزام والصبر.",
            "اجعل اللغة جزءاً من روتينك اليومي، كشرب الماء تماماً.",
            "التحديات التي تواجهها الآن في فهم النطق ستصبح ذكريات مضحكة غداً.",
            "بمجرد تمكنك من الإنجليزية، ستجد أن أبواب المعرفة فُتحت على مصراعيها.",
            "من يتعلم لغة جديدة يحصل على عقل ثانٍ ورؤية أعمق للحياة."
        ];


        // أدوات مساعدة للتاريخ (لحساب الاستمرارية والتذكيرات اليومية)
        const todayKey = () => new Date().toISOString().slice(0, 10);
        const daysBetween = (d1, d2) => Math.round((new Date(d2) - new Date(d1)) / 86400000);

        // مجموعة تذكيرات افتراضية تُستخدم للتعبئة التلقائية بعد الساعة 12 ظهراً
        const DEFAULT_REMINDER_POOL = [
            'راجع 20 كلمة في قسم المفردات',
            'اقرأ 15 دقيقة في قسم القراءة',
            'استمع لمدة 10 دقائق من مصدر مفضل',
            'اكتب فقرة قصيرة في قسم الكتابة',
            'مارس تقنية الـ Shadowing لمدة 10 دقائق',
            'تحدث بصوت عالٍ لمدة 5 دقائق أمام المرآة'
        ];

        // ترحيل لمرة واحدة: نضمن أن الاستمرارية تبدأ فعلياً من 1 في هذا الإصدار المحدث (حتى لو كان مخزّناً سابقاً رقم مختلف في المتصفح)
        (function migrateStreakDataOnce() {
            const MIGRATION_FLAG = 'streak_reset_v2';
            if (localStorage.getItem('app_migration_flag') !== MIGRATION_FLAG) {
                localStorage.setItem('streak_count', '1');
                localStorage.setItem('streak_last_active', new Date().toISOString().slice(0, 10));
                localStorage.setItem('app_migration_flag', MIGRATION_FLAG);
            }
        })();

        // ==========================================
        // 2. APP UI & SCREENS
        // ==========================================
        function App({ onLogout, userEmail }) {
            const [currentTab, setCurrentTab] = useState('home');
            const [darkMode, setDarkMode] = useState(false);

            // STATE FOR GLOBAL PROGRESS (STUDY CIRCLE)
            const [streaks, setStreaks] = useState(() => {
                const saved = localStorage.getItem('streak_count');
                return saved !== null ? parseInt(saved, 10) : 1;
            });
            const [lastActiveDate, setLastActiveDate] = useState(() => {
                return localStorage.getItem('streak_last_active') || todayKey();
            });
            const [dailyProgress, setDailyProgress] = useState({
                reading: 0, listening: 0, speaking: 0, writing: 0, shadowing: 0, vocabulary: 0, words: 0, books: 0
            });

            // تذكيرات اليوم (يكتبها المستخدم بنفسه، بحد أقصى 4، وتُستكمل تلقائياً بعد الساعة 12 ظهراً)
            const [dailyReminders, setDailyReminders] = useState(() => {
                const saved = localStorage.getItem('daily_reminders');
                if (!saved) return [];
                const parsed = JSON.parse(saved);
                return parsed.date === todayKey() ? parsed.items : [];
            });

            // LOCAL PERSISTED DATABASES
            const [decks, setDecks] = useState(() => {
                const saved = localStorage.getItem('srs_decks');
                return saved ? JSON.parse(saved) : [
                    { id: '1', title: 'أساسيات يومية', cards: [] }
                ];
            });

            // ممارسة الكلمات
            const [wordUnits, setWordUnits] = useState(() => {
                const saved = localStorage.getItem('word_units');
                return saved ? JSON.parse(saved) : [];
            });

            // كتبي وتقدم الكورسات
            const [completedLessons, setCompletedLessons] = useState(() => {
                const saved = localStorage.getItem('completed_lessons');
                return saved ? JSON.parse(saved) : {};
            });

            const [grammarStatus, setGrammarStatus] = useState(() => {
                const saved = localStorage.getItem('grammar_status');
                return saved ? JSON.parse(saved) : { currentRound: 1, checkedBoxes: {} };
            });

            // شاشة الممارسة العامة - مصادر وملفات القراءة (منقسمة إلى جديد / تم القراءة)
            const [readingSources, setReadingSources] = useState(() => {
                const saved = localStorage.getItem('reading_sources');
                return saved ? JSON.parse(saved) : [null, null, null, null];
            });
            const [readingUnitsNew, setReadingUnitsNew] = useState(() => {
                const saved = localStorage.getItem('reading_units_new');
                return saved ? JSON.parse(saved) : [];
            });
            const [readingUnitsRead, setReadingUnitsRead] = useState(() => {
                const saved = localStorage.getItem('reading_units_read');
                return saved ? JSON.parse(saved) : [];
            });

            // شاشة الكتابة
            const [writingTopics, setWritingTopics] = useState(() => {
                const saved = localStorage.getItem('writing_topics');
                return saved ? JSON.parse(saved) : [];
            });
            const [writingSuggestions, setWritingSuggestions] = useState(() => {
                const saved = localStorage.getItem('writing_suggestions');
                return saved ? JSON.parse(saved) : [];
            });

            // شاشة الاستماع
            const [listeningSources, setListeningSources] = useState(() => {
                const saved = localStorage.getItem('listening_sources');
                return saved ? JSON.parse(saved) : [null, null, null, null];
            });
            const [listeningUnitsNew, setListeningUnitsNew] = useState(() => {
                const saved = localStorage.getItem('listening_units_new');
                return saved ? JSON.parse(saved) : [];
            });
            const [listeningUnitsCompleted, setListeningUnitsCompleted] = useState(() => {
                const saved = localStorage.getItem('listening_units_completed');
                return saved ? JSON.parse(saved) : [];
            });

            // شاشة التحدث
            const [speakingSources, setSpeakingSources] = useState(() => {
                const saved = localStorage.getItem('speaking_sources');
                return saved ? JSON.parse(saved) : [null, null];
            });
            const [speakingSuggestions, setSpeakingSuggestions] = useState(() => {
                const saved = localStorage.getItem('speaking_suggestions');
                return saved ? JSON.parse(saved) : [];
            });

            // شاشة Shadowing
            const [shadowingSources, setShadowingSources] = useState(() => {
                const saved = localStorage.getItem('shadowing_sources');
                return saved ? JSON.parse(saved) : [null, null, null, null];
            });
            const [shadowingUnitsNew, setShadowingUnitsNew] = useState(() => {
                const saved = localStorage.getItem('shadowing_units_new');
                return saved ? JSON.parse(saved) : [];
            });

            // قسم أخرى
            const [otherElements, setOtherElements] = useState(() => {
                const saved = localStorage.getItem('other_elements');
                return saved ? JSON.parse(saved) : [];
            });

            // Save Databases to LocalStorage on Change
            useEffect(() => { safeSetLocalStorage('srs_decks', JSON.stringify(decks)); }, [decks]);
            useEffect(() => { safeSetLocalStorage('word_units', JSON.stringify(wordUnits)); }, [wordUnits]);
            useEffect(() => { safeSetLocalStorage('completed_lessons', JSON.stringify(completedLessons)); }, [completedLessons]);
            useEffect(() => { safeSetLocalStorage('grammar_status', JSON.stringify(grammarStatus)); }, [grammarStatus]);
            useEffect(() => { safeSetLocalStorage('reading_sources', JSON.stringify(readingSources)); }, [readingSources]);
            useEffect(() => { safeSetLocalStorage('reading_units_new', JSON.stringify(readingUnitsNew)); }, [readingUnitsNew]);
            useEffect(() => { safeSetLocalStorage('reading_units_read', JSON.stringify(readingUnitsRead)); }, [readingUnitsRead]);
            useEffect(() => { safeSetLocalStorage('writing_topics', JSON.stringify(writingTopics)); }, [writingTopics]);
            useEffect(() => { safeSetLocalStorage('writing_suggestions', JSON.stringify(writingSuggestions)); }, [writingSuggestions]);
            useEffect(() => { safeSetLocalStorage('listening_sources', JSON.stringify(listeningSources)); }, [listeningSources]);
            useEffect(() => { safeSetLocalStorage('listening_units_new', JSON.stringify(listeningUnitsNew)); }, [listeningUnitsNew]);
            useEffect(() => { safeSetLocalStorage('listening_units_completed', JSON.stringify(listeningUnitsCompleted)); }, [listeningUnitsCompleted]);
            useEffect(() => { safeSetLocalStorage('speaking_sources', JSON.stringify(speakingSources)); }, [speakingSources]);
            useEffect(() => { safeSetLocalStorage('speaking_suggestions', JSON.stringify(speakingSuggestions)); }, [speakingSuggestions]);
            useEffect(() => { safeSetLocalStorage('shadowing_sources', JSON.stringify(shadowingSources)); }, [shadowingSources]);
            useEffect(() => { safeSetLocalStorage('shadowing_units_new', JSON.stringify(shadowingUnitsNew)); }, [shadowingUnitsNew]);
            useEffect(() => { safeSetLocalStorage('other_elements', JSON.stringify(otherElements)); }, [otherElements]);
            useEffect(() => { safeSetLocalStorage('streak_count', String(streaks)); }, [streaks]);
            useEffect(() => { safeSetLocalStorage('streak_last_active', lastActiveDate); }, [lastActiveDate]);
            useEffect(() => { safeSetLocalStorage('daily_reminders', JSON.stringify({ date: todayKey(), items: dailyReminders })); }, [dailyReminders]);

            // Dark Mode Effect
            useEffect(() => {
                if (darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [darkMode]);

            // فحص كسر الاستمرارية عند فتح التطبيق: غياب يومين متتاليين كاملين يكسر السلسلة
            useEffect(() => {
                const today = todayKey();
                const last = localStorage.getItem('streak_last_active');
                if (last && last !== today) {
                    const gap = daysBetween(last, today); // عدد الأيام الفاصلة
                    // gap = 1: نشط أمس (طبيعي) | gap = 2: غاب يوم واحد فقط (لا يزال ضمن السماح)
                    // gap >= 3: يعني يومين كاملين متتاليين بلا أي نشاط -> تنكسر السلسلة
                    if (gap >= 3) {
                        setStreaks(0);
                    }
                }
            }, []);

            // تسجيل أول نشاط في اليوم: يزيد الاستمرارية مرة واحدة فقط باليوم
            const registerActivityToday = () => {
                const today = todayKey();
                setLastActiveDate(prevDate => {
                    if (prevDate !== today) {
                        setStreaks(prevStreak => prevStreak + 1);
                        return today;
                    }
                    return prevDate;
                });
            };

            // تعبئة تلقائية للتذكيرات بعد الساعة 12 ظهراً إن لم يكملها المستخدم بنفسه
            useEffect(() => {
                const checkAutoFillReminders = () => {
                    const now = new Date();
                    if (now.getHours() >= 12) {
                        setDailyReminders(prev => {
                            if (prev.length >= 4) return prev;
                            const need = 4 - prev.length;
                            const existingTexts = prev.map(r => r.text);
                            const pool = DEFAULT_REMINDER_POOL.filter(p => !existingTexts.includes(p));
                            const additions = pool.slice(0, need).map((text, i) => ({
                                id: 'auto_' + Date.now() + '_' + i,
                                text,
                                done: false,
                                auto: true
                            }));
                            return additions.length ? [...prev, ...additions] : prev;
                        });
                    }
                };
                checkAutoFillReminders();
                const interval = setInterval(checkAutoFillReminders, 60000);
                return () => clearInterval(interval);
            }, []);

            // Calculate current Study Circle Percentage
            const currentProgressPercentage = useMemo(() => {
                const values = Object.values(dailyProgress);
                const sum = values.reduce((acc, val) => acc + val, 0);
                return Math.min(100, Math.round((sum / 200) * 100)); // target 200 units overall
            }, [dailyProgress]);

            // إضافة وقت مهارة معينة (تُستخدم من قبل المؤقتات الفردية داخل ملخص نشاط اليوم)
            const addSkillTime = (skillKey, minutes) => {
                setDailyProgress(prev => ({ ...prev, [skillKey]: prev[skillKey] + minutes }));
                registerActivityToday();
            };

            const makeStatAdder = (skillKey) => (amount = 1) => {
                setDailyProgress(prev => ({ ...prev, [skillKey]: prev[skillKey] + amount }));
                registerActivityToday();
            };

            return (
                <div class="min-h-screen flex flex-col pb-20 bg-white dark:bg-slate-900">
                    {/* Header */}
                    <header class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur border-b border-slate-100 dark:border-slate-800 px-6 py-4 flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <img src={window.APP_LOGO} class="w-10 h-10 rounded-xl object-cover" />
                            <div>
                                <h1 class="text-xl font-extrabold text-primary-600 dark:text-primary-500">Study Circle</h1>
                                <p class="text-xs text-slate-400">رحلتك نحو طلاقة الإنجليزية</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-4">
                            <button onClick={() => setDarkMode(!darkMode)} class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400">
                                {darkMode ? <i data-lucide="sun" class="w-5 h-5 text-amber-500"></i> : <i data-lucide="moon" class="w-5 h-5"></i>}
                            </button>
                            <div class="flex items-center gap-1 bg-amber-50 dark:bg-amber-950/30 text-amber-600 px-3 py-1.5 rounded-full font-bold text-sm">
                                <i data-lucide="flame" class="w-4 h-4 fill-current"></i>
                                <span class="font-inter">{streaks} Days</span>
                            </div>
                            {onLogout && (
                                <button onClick={onLogout} title={userEmail || 'تسجيل الخروج'} class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-400 hover:text-red-500">
                                    <i data-lucide="log-out" class="w-5 h-5"></i>
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Main Content Render */}
                    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6">
                        {currentTab === 'home' && (
                            <HomeScreen
                                streaks={streaks}
                                dailyProgress={dailyProgress}
                                currentProgressPercentage={currentProgressPercentage}
                                onNavigate={setCurrentTab}
                                onAddSkillTime={addSkillTime}
                                dailyReminders={dailyReminders}
                                setDailyReminders={setDailyReminders}
                            />
                        )}
                        {currentTab === 'vocabulary' && (
                            <VocabularyScreen
                                decks={decks}
                                setDecks={setDecks}
                                onAddStats={makeStatAdder('vocabulary')}
                            />
                        )}
                        {currentTab === 'practice' && <PracticeHubScreen onNavigate={setCurrentTab} />}
                        {currentTab === 'books' && (
                            <BooksScreen
                                completedLessons={completedLessons}
                                setCompletedLessons={setCompletedLessons}
                                grammarStatus={grammarStatus}
                                setGrammarStatus={setGrammarStatus}
                                onAddStats={makeStatAdder('books')}
                                onBack={() => setCurrentTab('home')}
                            />
                        )}
                        {currentTab === 'word_practice' && (
                            <WordPracticeScreen
                                wordUnits={wordUnits}
                                setWordUnits={setWordUnits}
                                onAddStats={makeStatAdder('words')}
                            />
                        )}
                        {currentTab === 'motivation' && <MotivationScreen />}
                        {currentTab === 'reading' && (
                            <ReadingScreen
                                sources={readingSources}
                                setSources={setReadingSources}
                                unitsNew={readingUnitsNew}
                                setUnitsNew={setReadingUnitsNew}
                                unitsRead={readingUnitsRead}
                                setUnitsRead={setReadingUnitsRead}
                                onAddStats={makeStatAdder('reading')}
                                onBack={() => setCurrentTab('practice')}
                            />
                        )}
                        {currentTab === 'writing' && (
                            <WritingScreen
                                topics={writingTopics}
                                setWritingTopics={setWritingTopics}
                                suggestions={writingSuggestions}
                                setSuggestions={setWritingSuggestions}
                                onAddStats={makeStatAdder('writing')}
                                onBack={() => setCurrentTab('practice')}
                            />
                        )}
                        {currentTab === 'listening' && (
                            <ListeningScreen
                                sources={listeningSources}
                                setSources={setListeningSources}
                                unitsNew={listeningUnitsNew}
                                setUnitsNew={setListeningUnitsNew}
                                unitsCompleted={listeningUnitsCompleted}
                                setUnitsCompleted={setListeningUnitsCompleted}
                                onAddStats={makeStatAdder('listening')}
                                onBack={() => setCurrentTab('practice')}
                            />
                        )}
                        {currentTab === 'speaking' && (
                            <SpeakingScreen
                                sources={speakingSources}
                                setSources={setSpeakingSources}
                                suggestions={speakingSuggestions}
                                setSuggestions={setSpeakingSuggestions}
                                onAddStats={makeStatAdder('speaking')}
                                onBack={() => setCurrentTab('practice')}
                            />
                        )}
                        {currentTab === 'shadowing' && (
                            <ShadowingScreen
                                sources={shadowingSources}
                                setSources={setShadowingSources}
                                unitsNew={shadowingUnitsNew}
                                setUnitsNew={setShadowingUnitsNew}
                                onAddStats={makeStatAdder('shadowing')}
                                onBack={() => setCurrentTab('practice')}
                            />
                        )}
                        {currentTab === 'other' && (
                            <OtherScreen elements={otherElements} setElements={setOtherElements} onBack={() => setCurrentTab('practice')} />
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-950/95 backdrop-blur border-t border-slate-100 dark:border-slate-800 py-2 flex justify-around items-center z-40">
                        <NavigationButton active={currentTab === 'home'} icon="home" label="الرئيسية" onClick={() => setCurrentTab('home')} />
                        <NavigationButton active={currentTab === 'vocabulary'} icon="bookmark" label="المفردات" onClick={() => setCurrentTab('vocabulary')} />
                        <NavigationButton active={currentTab === 'practice'} icon="activity" label="الممارسة" onClick={() => setCurrentTab('practice')} />
                        <NavigationButton active={currentTab === 'books'} icon="book-open" label="كتبي" onClick={() => setCurrentTab('books')} />
                        <NavigationButton active={currentTab === 'word_practice'} icon="type" label="الكلمات" onClick={() => setCurrentTab('word_practice')} />
                        <NavigationButton active={currentTab === 'motivation'} icon="sparkles" label="التحفيز" onClick={() => setCurrentTab('motivation')} />
                    </nav>
                </div>
            );
        }

        function NavigationButton({ active, icon, label, onClick }) {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return (
                <button onClick={onClick} class={`flex flex-col items-center gap-1 px-3 py-1 rounded-xl transition-all duration-200 ${active ? 'text-primary-500 scale-110' : 'text-slate-400 dark:text-slate-500 hover:text-slate-600'}`}>
                    <i data-lucide={icon} class="w-5 h-5"></i>
                    <span class="text-[10px] font-semibold">{label}</span>
                </button>
            );
        }

        // زر سهم الرجوع (يُستخدم في كل نافذة/شاشة فرعية لا تحتوي طريقة رجوع)
        function BackButton({ onClick, label = "رجوع" }) {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, []);
            return (
                <button onClick={onClick} class="flex items-center gap-1 text-slate-500 hover:text-primary-600 dark:text-slate-300 font-bold text-xs px-3 py-1.5 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    <span>{label}</span>
                </button>
            );
        }

        // ==========================================
        // 3. HOME SCREEN COMPONENTS
        // ==========================================

        // مؤقت (Stopwatch) صغير لكل مهارة، يتفاعل مع Study Circle وملخص نشاط اليوم
        function ActivityMetricItem({ icon, title, value, color, skillKey, onAddSkillTime }) {
            const [running, setRunning] = useState(false);
            const [seconds, setSeconds] = useState(0);
            const intervalRef = useRef(null);

            useEffect(() => {
                if (running) {
                    intervalRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
                } else if (intervalRef.current) {
                    clearInterval(intervalRef.current);
                }
                return () => clearInterval(intervalRef.current);
            }, [running]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [running]);

            const handleToggle = () => {
                if (running && seconds > 0) {
                    onAddSkillTime(skillKey, seconds / 60);
                    setSeconds(0);
                }
                setRunning(!running);
            };

            const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
            const ss = String(seconds % 60).padStart(2, '0');

            return (
                <div class="flex items-center gap-2.5 p-3 border border-slate-50 dark:border-slate-700/30 rounded-2xl bg-slate-50/50 dark:bg-slate-800/50">
                    <div class={`w-9 h-9 rounded-xl flex items-center justify-center shrink-0 ${color}`}>
                        <i data-lucide={icon} class="w-4.5 h-4.5"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs text-slate-400">{title}</p>
                        <p class="font-bold text-slate-700 dark:text-slate-200 font-inter text-xs mt-0.5">{value}</p>
                    </div>
                    {skillKey && onAddSkillTime && (
                        <div class="flex items-center gap-1 shrink-0">
                            {running && <span class="text-[9px] font-inter text-slate-400">{mm}:{ss}</span>}
                            <button onClick={handleToggle} class={`w-6 h-6 rounded-full flex items-center justify-center text-white ${running ? 'bg-red-500' : 'bg-primary-500'}`}>
                                <i data-lucide={running ? 'pause' : 'play'} class="w-3 h-3"></i>
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        // قسم تذكيرات اليوم: يكتب المستخدم حتى 4 تذكيرات، وتُستكمل تلقائياً إن لم يكتب شيئاً قبل الساعة 12 ظهراً
        function TodayReminders({ dailyReminders, setDailyReminders }) {
            const [newReminderText, setNewReminderText] = useState('');
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [dailyReminders]);

            const handleAddReminder = () => {
                if (!newReminderText.trim() || dailyReminders.length >= 4) return;
                setDailyReminders([...dailyReminders, { id: Date.now().toString(), text: newReminderText, done: false, auto: false }]);
                setNewReminderText('');
            };

            const toggleReminder = (id) => {
                setDailyReminders(dailyReminders.map(r => r.id === id ? { ...r, done: !r.done } : r));
            };

            const deleteReminder = (id) => {
                setDailyReminders(dailyReminders.filter(r => r.id !== id));
            };

            return (
                <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700/50 rounded-3xl p-6">
                    <div class="flex items-center gap-2 mb-4 justify-between">

                        <span class="text-[10px] font-inter text-slate-400">{dailyReminders.length}/4</span>
                    </div>

                    <div class="space-y-2">

                                <label onClick={() => toggleReminder(r.id)} class="flex items-center gap-3 cursor-pointer flex-1">
                                    <input type="checkbox" checked={r.done} onChange={() => {}} class="w-5 h-5 accent-primary-500 rounded border-slate-300 text-primary-500" />
                                    <span class={`text-sm ${r.done ? 'line-through text-slate-400' : 'text-slate-600 dark:text-slate-300'}`}>{r.text}</span>
                                    {r.auto && <span class="text-[9px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-full font-bold shrink-0">تلقائي</span>}

                                <button onClick={() => deleteReminder(r.id)} class="text-slate-300 hover:text-red-500 shrink-0">

        // ==========================================
        // مكوّن مساعد: إضافة صورة أو تسجيل صوتي من الملفات لأي حقل (وجه أمامي/خلفي...الخ)
        // ==========================================
        function MediaAttachments({ image, onImageChange, audio, onAudioChange, hideImage = false }) {
            const fileInputRef = useRef(null);
            const audioInputRef = useRef(null);
            const mediaRecorderRef = useRef(null);
            const chunksRef = useRef([]);
            const [isRecording, setIsRecording] = useState(false);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [image, audio, isRecording]);

            const handleImagePick = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => onImageChange(reader.result);
                reader.readAsDataURL(file);
            };

            const handleAudioFilePick = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => onAudioChange(reader.result);
                reader.readAsDataURL(file);
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const recorder = new MediaRecorder(stream);
                    chunksRef.current = [];
                    recorder.ondataavailable = (e) => chunksRef.current.push(e.data);
                    recorder.onstop = () => {
                        const blob = new Blob(chunksRef.current, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = () => onAudioChange(reader.result);
                        reader.readAsDataURL(blob);
                        stream.getTracks().forEach(t => t.stop());
                    };
                    mediaRecorderRef.current = recorder;
                    recorder.start();
                    setIsRecording(true);
                } catch (err) {
                    alert('تعذّر الوصول إلى الميكروفون. تأكد من السماح للتطبيق باستخدامه.');
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current) mediaRecorderRef.current.stop();
                setIsRecording(false);
            };

            return (
                <div class="space-y-2">
                    <div class="flex items-center gap-2 flex-wrap">
                        {!hideImage && (
                            <React.Fragment>
                                <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImagePick} class="hidden" />
                                <button type="button" onClick={() => fileInputRef.current.click()} class="flex items-center gap-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-200 px-3 py-1.5 rounded-lg text-[11px] font-bold">
                                    <i data-lucide="image" class="w-3.5 h-3.5"></i> إضافة صورة
                                </button>
                            </React.Fragment>
                        )}

                        <input type="file" accept="audio/*" ref={audioInputRef} onChange={handleAudioFilePick} class="hidden" />
                        <button type="button" onClick={() => audioInputRef.current.click()} class="flex items-center gap-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-200 px-3 py-1.5 rounded-lg text-[11px] font-bold">
                            <i data-lucide="upload" class="w-3.5 h-3.5"></i> رفع صوت
                        </button>

                        {!isRecording ? (
                            <button type="button" onClick={startRecording} class="flex items-center gap-1 bg-red-50 text-red-500 px-3 py-1.5 rounded-lg text-[11px] font-bold">
                                <i data-lucide="mic" class="w-3.5 h-3.5"></i> تسجيل صوت
                            </button>
                        ) : (
                            <button type="button" onClick={stopRecording} class="flex items-center gap-1 bg-red-500 text-white px-3 py-1.5 rounded-lg text-[11px] font-bold animate-pulse">
                                <i data-lucide="square" class="w-3.5 h-3.5"></i> إيقاف التسجيل
                            </button>
                        )}
                    </div>
                    {!hideImage && image && (
                        <div class="relative inline-block">
                            <img src={image} class="h-16 rounded-lg border border-slate-200" />
                            <button type="button" onClick={() => onImageChange(null)} class="absolute -top-1.5 -left-1.5 bg-slate-800 text-white rounded-full w-4 h-4 flex items-center justify-center text-[9px]">×</button>
                        </div>
                    )}
                    {audio && (
                        <div class="flex items-center gap-2">
                            <audio controls src={audio} class="h-8 max-w-[220px]"></audio>
                            <button type="button" onClick={() => onAudioChange(null)} class="text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 4. VOCABULARY SCREEN (SRS ENGINE DRIVEN)
        // ==========================================
        function VocabularyScreen({ decks, setDecks, onAddStats }) {
            const [selectedDeck, setSelectedDeck] = useState(null);
            const [isReviewing, setIsReviewing] = useState(false);
            const [isAddingCard, setIsAddingCard] = useState(false);
            const [isAddingDeck, setIsAddingDeck] = useState(false);
            const [managingDeck, setManagingDeck] = useState(null); // لعرض/حذف بطاقات رزمة معينة

            // Inputs
            const [newDeckTitle, setNewDeckTitle] = useState('');
            const [frontText, setFrontText] = useState('');
            const [backText, setBackText] = useState('');
            const [frontImage, setFrontImage] = useState(null);
            const [frontAudio, setFrontAudio] = useState(null);
            const [backImage, setBackImage] = useState(null);
            const [backAudio, setBackAudio] = useState(null);

            // Search
            const [searchQuery, setSearchQuery] = useState('');

            // Review Session State
            const [reviewCards, setReviewCards] = useState([]);
            const [currentCardIndex, setCurrentCardIndex] = useState(0);
            const [revealAnswer, setRevealAnswer] = useState(false);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // Statistics computation
            const stats = useMemo(() => {
                let totalCards = 0;
                let dueCount = 0;
                let learning = 0, review = 0, newCards = 0;

                decks.forEach(d => {
                    d.cards.forEach(c => {
                        totalCards++;
                        const isDue = new Date(c.dueDate) <= new Date();
                        if (isDue) dueCount++;
                        if (c.state === 'New') newCards++;
                        else if (c.state === 'Learning' || c.state === 'Relearning') learning++;
                        else if (c.state === 'Review') review++;
                    });
                });

                return { totalCards, dueCount, learning, review, newCards };
            }, [decks]);

            // Start review for all due cards of a deck
            const startReviewSession = (deck) => {
                const now = new Date();
                const due = deck.cards.filter(c => new Date(c.dueDate) <= now);
                if (due.length > 0) {
                    setReviewCards(due);
                    setCurrentCardIndex(0);
                    setRevealAnswer(false);
                    setIsReviewing(true);
                } else {
                    alert("لا توجد بطاقات مستحقة للمراجعة حالياً!");
                }
            };

            // Handle user choice rating on a card
            const handleRateCard = (grade) => {
                const currentCard = reviewCards[currentCardIndex];
                const updatedStats = SRSScheduler.calculate(currentCard, grade);

                // Update the persisted state
                setDecks(prev => prev.map(d => {
                    return {
                        ...d,
                        cards: d.cards.map(c => c.id === currentCard.id ? { ...c, ...updatedStats } : c)
                    };
                }));

                onAddStats(); // Increment global counter

                if (currentCardIndex + 1 < reviewCards.length) {
                    setCurrentCardIndex(prev => prev + 1);
                    setRevealAnswer(false);
                } else {
                    setIsReviewing(false);
                    alert("انتهت مراجعات اليوم بنجاح! أحسنت عملًا.");
                }
            };

            // Create Deck
            const handleCreateDeck = () => {
                if (!newDeckTitle.trim()) return;
                const newDeck = {
                    id: Date.now().toString(),
                    title: newDeckTitle,
                    cards: []
                };
                setDecks([...decks, newDeck]);
                setNewDeckTitle('');
                setIsAddingDeck(false);
            };

            // Delete Deck
            const handleDeleteDeck = (deckId) => {
                if (!confirm('هل أنت متأكد من حذف هذه الرزمة وجميع بطاقاتها؟')) return;
                setDecks(decks.filter(d => d.id !== deckId));
            };

            // Delete Card
            const handleDeleteCard = (deckId, cardId) => {
                setDecks(prev => prev.map(d => d.id === deckId ? { ...d, cards: d.cards.filter(c => c.id !== cardId) } : d));
            };

            const resetCardForm = () => {
                setFrontText(''); setBackText('');
                setFrontImage(null); setFrontAudio(null);
                setBackImage(null); setBackAudio(null);
            };

            // Create Card
            const handleCreateCard = () => {
                if (!frontText.trim() || !backText.trim() || !selectedDeck) return;

                const newCard = {
                    id: Date.now().toString(),
                    front: frontText,
                    frontImage, frontAudio,
                    back: backText,
                    backImage, backAudio,
                    easeFactor: 2.5,
                    interval: 0,
                    repetitions: 0,
                    lapses: 0,
                    dueDate: new Date().toISOString(),
                    state: 'New'
                };

                setDecks(prev => prev.map(d => {
                    if (d.id === selectedDeck.id) {
                        return { ...d, cards: [...d.cards, newCard] };
                    }
                    return d;
                }));

                resetCardForm();
                setIsAddingCard(false);
            };

            return (
                <div class="space-y-6">
                    {/* Upper stats bar */}
                    <div class="grid grid-cols-4 gap-4 bg-slate-50 dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                        <div class="text-center">
                            <span class="block text-2xl font-black text-primary-500 font-inter">{stats.totalCards}</span>
                            <span class="text-xs text-slate-400">إجمالي البطاقات</span>
                        </div>
                        <div class="text-center">
                            <span class="block text-2xl font-black text-amber-500 font-inter">{stats.dueCount}</span>
                            <span class="text-xs text-slate-400">مستحق المراجعة</span>
                        </div>
                        <div class="text-center">
                            <span class="block text-2xl font-black text-blue-500 font-inter">{stats.learning}</span>
                            <span class="text-xs text-slate-400">قيد التعلم</span>
                        </div>
                        <div class="text-center">
                            <span class="block text-2xl font-black text-slate-500 font-inter">{stats.review}</span>
                            <span class="text-xs text-slate-400">تثبيت ومراجعة</span>
                        </div>
                    </div>

                    {/* Search bar within cards */}
                    <div class="relative">
                        <input
                            type="text"
                            placeholder="البحث داخل البطاقات والمفردات..."
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                            class="w-full pl-10 pr-4 py-3 rounded-2xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500"
                        />
                        <i data-lucide="search" class="absolute left-3.5 top-3.5 text-slate-400 w-4 h-4"></i>
                    </div>

                    {/* Decks Grid */}
                    {!isReviewing && (
                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <h3 class="text-lg font-bold">رزم المفردات الحالية</h3>
                                <button onClick={() => setIsAddingDeck(true)} class="bg-primary-500 hover:bg-primary-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5">
                                    <i data-lucide="plus" class="w-4 h-4"></i>
                                    إنشاء رزمة جديدة
                                </button>
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {decks.filter(d => !searchQuery.trim() || d.title.toLowerCase().includes(searchQuery.toLowerCase()) || d.cards.some(c => c.front.toLowerCase().includes(searchQuery.toLowerCase()) || c.back.toLowerCase().includes(searchQuery.toLowerCase()))).map(deck => {
                                    const dueCards = deck.cards.filter(c => new Date(c.dueDate) <= new Date());
                                    return (
                                        <div key={deck.id} class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-5 rounded-2xl shadow-sm hover:shadow-md transition-all flex flex-col justify-between">
                                            <div class="flex justify-between items-start">

                    nextRound += 1;
                    // Reset check boxes and raise round count
                    alert(`أحسنت! أكملت الجولة ${grammarStatus.currentRound}. ستبدأ الجولة ${nextRound} بلون مختلف.`);
                    setGrammarStatus({ currentRound: nextRound, checkedBoxes: {} });
                    return;

        function WordPracticeScreen({ wordUnits, setWordUnits, onAddStats }) {
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [isAddingUnit, setIsAddingUnit] = useState(false);
            const [isAddingWord, setIsAddingWord] = useState(false);

            const [unitName, setUnitName] = useState('');
            const [wordText, setWordText] = useState('');
            const [wordClassification, setWordClassification] = useState('Noun');
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // Toggle word checked boxes
            const toggleWordCheck = (unitId, wordId, boxIndex) => {
                setWordUnits(prev => prev.map(u => {
                    if (u.id === unitId) {
                        return {
                            ...u,
                            words: u.words.map(w => {
                                if (w.id === wordId) {
                                    const nextBoxes = [...w.boxes];
                                    nextBoxes[boxIndex] = !nextBoxes[boxIndex];
                                    if (nextBoxes[boxIndex]) onAddStats(); // Add global session progress stats
                                    return { ...w, boxes: nextBoxes };
                                }
                                return w;
                            })
                        };
                    }
                    return u;
                }));
            };

            const handleCreateUnit = () => {
                if (!unitName.trim()) return;
                const newUnit = {
                    id: Date.now().toString(),
                    name: unitName,
                    words: []
                };

        // ==========================================
        // مكوّن لوحة رسم/تعليق (بالقلم أو الإصبع) فوق الملف المعروض، مع إمكانية المسح والحفظ
        // ==========================================
        function AnnotationCanvas({ initialData, onSave, height = 320 }) {
            const canvasRef = useRef(null);
            const drawingRef = useRef(false);
            const [mode, setMode] = useState('pen'); // pen | eraser
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [mode]);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                if (initialData) {
                    const img = new Image();
                    img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    img.src = initialData;
                }
            }, []);

            const getPos = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: (clientX - rect.left) * (canvasRef.current.width / rect.width), y: (clientY - rect.top) * (canvasRef.current.height / rect.height) };
            };

            const startDraw = (e) => {
                e.preventDefault();
                drawingRef.current = true;
                const ctx = canvasRef.current.getContext('2d');
                const { x, y } = getPos(e);
                ctx.beginPath();
                ctx.moveTo(x, y);
            };

            const draw = (e) => {
                if (!drawingRef.current) return;
                e.preventDefault();
                const ctx = canvasRef.current.getContext('2d');
                const { x, y } = getPos(e);
                ctx.lineWidth = mode === 'eraser' ? 20 : 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = mode === 'eraser' ? '#ffffff' : '#1d4ed8';
                ctx.globalCompositeOperation = mode === 'eraser' ? 'destination-out' : 'source-over';
                ctx.lineTo(x, y);
                ctx.stroke();
            };

            const endDraw = () => { drawingRef.current = false; };

            const clearCanvas = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            };

            const handleSave = () => {
                onSave(canvasRef.current.toDataURL('image/png'));
            };

            return (
                <div class="space-y-2">
                    <div class="flex items-center gap-2">
                        <button type="button" onClick={() => setMode('pen')} class={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-[11px] font-bold ${mode === 'pen' ? 'bg-primary-500 text-white' : 'bg-slate-100 text-slate-600'}`}>
                            <i data-lucide="pen" class="w-3.5 h-3.5"></i> قلم
                        </button>
                        <button type="button" onClick={() => setMode('eraser')} class={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-[11px] font-bold ${mode === 'eraser' ? 'bg-primary-500 text-white' : 'bg-slate-100 text-slate-600'}`}>
                            <i data-lucide="eraser" class="w-3.5 h-3.5"></i> ممسحة (إصبع)
                        </button>
                        <button type="button" onClick={clearCanvas} class="flex items-center gap-1 px-3 py-1.5 rounded-lg text-[11px] font-bold bg-slate-100 text-slate-600">
                            <i data-lucide="rotate-ccw" class="w-3.5 h-3.5"></i> تفريغ الكل
                        </button>
                        <button type="button" onClick={handleSave} class="flex items-center gap-1 px-3 py-1.5 rounded-lg text-[11px] font-bold bg-emerald-500 text-white mr-auto">
                            <i data-lucide="save" class="w-3.5 h-3.5"></i> حفظ التعديلات
                        </button>
                    </div>
                    <canvas
                        ref={canvasRef}
                        width={600}
                        height={height}
                        class="draw-canvas w-full bg-white border border-slate-200 rounded-xl"
                        onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
                        onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
                    ></canvas>
                </div>
            );
        }

        // صفحة فرعية موحّدة لوحدات القراءة (تُستخدم لكل من "جديد" و "تم القراءة")
        function ReadingUnitsPage({ title, units, setUnits, onAddStats, onBack, allowFinish }) {
            const [selectedUnitId, setSelectedUnitId] = useState(null);
            const [isAddingUnit, setIsAddingUnit] = useState(false);
            const [isAddingFile, setIsAddingFile] = useState(false);
            const [viewingFileId, setViewingFileId] = useState(null);
            const [isEditingText, setIsEditingText] = useState(false);
            const [editDraft, setEditDraft] = useState('');

            const [unitName, setUnitName] = useState('');
            const [fileName, setFileName] = useState('');
            const [fileMode, setFileMode] = useState('upload'); // 'upload' (ملف حقيقي) | 'type' (نص مكتوب يدوياً)
            const [fileTextContent, setFileTextContent] = useState('');
            const [pickedFile, setPickedFile] = useState(null); // { kind, content, mime }
            const [filePickStatus, setFilePickStatus] = useState('idle'); // idle | loading | ready | error
            const fileInputRef = useRef(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            // نشتق البيانات الحيّة دائماً من قائمة units بدل الاحتفاظ بنسخة قديمة منفصلة،
            // هذا يضمن أن أي ملف جديد أو تعديل يظهر فوراً دون الحاجة لإعادة فتح الصفحة
            const selectedUnit = units.find(u => u.id === selectedUnitId) || null;
            const viewingFile = selectedUnit ? (selectedUnit.files.find(f => f.id === viewingFileId) || null) : null;

            const resetFilePicker = () => {
                setFileName(''); setFileTextContent(''); setPickedFile(null); setFileMode('upload');
                setFilePickStatus('idle');
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const handleCreateUnit = () => {
                if (!unitName.trim()) return;
                const newUnit = { id: Date.now().toString(), name: unitName, files: [] };
                setUnits([...units, newUnit]);
                setUnitName('');
                setIsAddingUnit(false);
            };

            // رفع أي ملف حقيقي (صورة، PDF، أو نص) والتعرف عليه تلقائياً
            const handleFilePick = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!fileName.trim()) setFileName(file.name);
                setFilePickStatus('loading');
                setPickedFile(null);

                if (file.size > 4 * 1024 * 1024) {
                    alert('تنبيه: هذا الملف كبير الحجم (أكبر من 4MB) وقد لا يتم حفظه محلياً بسبب محدودية مساحة المتصفح. يفضّل استخدام ملفات أصغر أو خيار "كتابة نص يدوياً".');
                }

                const mime = file.type || '';
                const isImage = mime.startsWith('image/');
                const isPdf = mime === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
                const isText = mime.startsWith('text/') || file.name.toLowerCase().match(/\.(txt|md)$/);

                const reader = new FileReader();
                reader.onerror = () => {
                    setFilePickStatus('error');
                    alert('تعذر قراءة هذا الملف. حاول مرة أخرى بملف آخر.');
                };
                if (isText) {
                    reader.onload = () => { setPickedFile({ kind: 'text', content: reader.result, mime }); setFilePickStatus('ready'); };
                    reader.readAsText(file);
                } else if (isImage) {
                    reader.onload = () => { setPickedFile({ kind: 'image', content: reader.result, mime }); setFilePickStatus('ready'); };
                    reader.readAsDataURL(file);
                } else if (isPdf) {
                    reader.onload = () => { setPickedFile({ kind: 'pdf', content: reader.result, mime }); setFilePickStatus('ready'); };
                    reader.readAsDataURL(file);
                } else {
                    // نوع آخر (Word، إلخ): نحفظه كملف قابل للتنزيل مع تنبيه أنه لا يمكن معاينته مباشرة
                    reader.onload = () => { setPickedFile({ kind: 'other', content: reader.result, mime }); setFilePickStatus('ready'); };
                    reader.readAsDataURL(file);
                }
            };

            const handleCreateFile = () => {
                if (!fileName.trim() || !selectedUnit) return;
                if (fileMode === 'upload' && (filePickStatus !== 'ready' || !pickedFile)) {
                    alert('انتظر حتى ينتهي تحميل الملف (أو اختر ملفاً أولاً) قبل الحفظ.');
                    return;
                }
                if (fileMode === 'type' && !fileTextContent.trim()) return;

                const newFile = fileMode === 'upload'
                    ? { id: Date.now().toString(), name: fileName, kind: pickedFile.kind, content: pickedFile.content, annotation: null }
                    : { id: Date.now().toString(), name: fileName, kind: 'text', content: fileTextContent, annotation: null };

                setUnits(prev => prev.map(u => u.id === selectedUnit.id ? { ...u, files: [...u.files, newFile] } : u));

                resetFilePicker();
                setIsAddingFile(false);
            };

            const handleSaveAnnotation = (unitId, fileId, dataUrl) => {
                setUnits(prev => prev.map(u => {
                    if (u.id !== unitId) return u;
                    return { ...u, files: u.files.map(f => f.id === fileId ? { ...f, annotation: dataUrl } : f) };
                }));
                alert('تم حفظ تعديلاتك على الملف بنجاح.');
            };

            // حفظ التعديل على محتوى النص نفسه (كتابة/حذف داخل الملف)
            const handleSaveTextEdit = () => {
                setUnits(prev => prev.map(u => {
                    if (u.id !== selectedUnit.id) return u;
                    return { ...u, files: u.files.map(f => f.id === viewingFile.id ? { ...f, content: editDraft } : f) };
                }));
                setIsEditingText(false);
                alert('تم حفظ التعديلات على نص الملف بنجاح.');
            };

            const handleFinishReading = (unitId, fileId, fileNameVal) => {
                onAddStats(15); // إضافة 15 دقيقة قراءة تلقائياً
                alert(`أحسنت! تم تسجيل إكمال قراءة الملف "${fileNameVal}".`);
            };

            const handleDeleteUnit = (unitId) => {
                if (!confirm('حذف هذه الوحدة وجميع ملفاتها؟')) return;
                setUnits(units.filter(u => u.id !== unitId));
                if (selectedUnitId === unitId) setSelectedUnitId(null);
            };

            const handleDeleteFile = (unitId, fileId) => {
                if (!confirm('هل تريد حذف هذا الملف؟')) return;
                setUnits(prev => prev.map(u => u.id === unitId ? { ...u, files: u.files.filter(f => f.id !== fileId) } : u));
                setViewingFileId(null);
                setIsEditingText(false);
            };

            // ترجمة النص المحدد (Selection) عبر جوجل ترانسليت في نافذة جديدة
            const handleTranslateSelection = () => {
                const selected = window.getSelection ? window.getSelection().toString().trim() : '';
                if (!selected) {
                    alert('حدد (لوّن) أي جزء من النص أولاً، ثم اضغط زر الترجمة.');
                    return;
                }
                const url = `https://translate.google.com/?sl=auto&tl=ar&text=${encodeURIComponent(selected)}&op=translate`;
                window.open(url, '_blank');
            };

            // ===================== شاشة عرض ملفات وحدة واحدة (Document Card UI) =====================
            if (selectedUnit && !viewingFile) {
                return (
                    <div class="space-y-6">
                        <div class="flex items-center justify-between">
                            <BackButton onClick={() => setSelectedUnitId(null)} label="رجوع للوحدات" />
                            <h2 class="text-lg font-black truncate">{selectedUnit.name}</h2>
                            <button onClick={() => { resetFilePicker(); setIsAddingFile(true); }} class="bg-primary-500 text-white text-xs px-3 py-1.5 rounded-xl font-bold shrink-0">+ أضف ملف</button>
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            {selectedUnit.files.map(file => (
                                <DocumentCard
                                    key={file.id}
                                    file={file}
                                    allowFinish={allowFinish}
                                    onOpen={(f) => { setViewingFileId(f.id); setIsEditingText(false); }}
                                    onDelete={(f) => handleDeleteFile(selectedUnit.id, f.id)}
                                    onFinish={(f) => handleFinishReading(selectedUnit.id, f.id, f.name)}
                                />
                            ))}
                        </div>
                        {selectedUnit.files.length === 0 && (
                            <p class="text-xs text-slate-400 text-center py-10">لا توجد ملفات في هذه الوحدة بعد. اضغط "+ أضف ملف" لإدراج أول ملف.</p>
                        )}

                        {/* Add File popup - رفع ملف حقيقي (صورة / PDF / نص) أو كتابة نص يدوياً */}
                        {isAddingFile && (
                            <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                                <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                    <div class="flex justify-between items-center">
                                        <h3 class="text-lg font-bold">إدراج ملف للوحدة: {selectedUnit.name}</h3>
                                        <BackButton onClick={() => { setIsAddingFile(false); resetFilePicker(); }} label="إغلاق" />
                                    </div>
                                    <input type="text" placeholder="اسم المقال أو الكتاب..." value={fileName} onChange={(e) => setFileName(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />

                                    <div class="flex gap-2">
                                        <button onClick={() => setFileMode('upload')} class={`flex-1 py-2 rounded-lg text-xs font-bold ${fileMode === 'upload' ? 'bg-primary-500 text-white' : 'bg-slate-100 text-slate-600'}`}>رفع ملف حقيقي</button>
                                        <button onClick={() => setFileMode('type')} class={`flex-1 py-2 rounded-lg text-xs font-bold ${fileMode === 'type' ? 'bg-primary-500 text-white' : 'bg-slate-100 text-slate-600'}`}>كتابة نص يدوياً</button>
                                    </div>

                                    {fileMode === 'upload' ? (
                                        <div class="space-y-2">
                                            <input type="file" accept="image/*,.pdf,.txt,.md,.doc,.docx" ref={fileInputRef} onChange={handleFilePick} class="w-full text-xs" />
                                            {filePickStatus === 'loading' && <span class="text-[11px] text-slate-500 font-bold block">⏳ جارٍ تحميل الملف، الرجاء الانتظار...</span>}
                                            {filePickStatus === 'error' && <span class="text-[11px] text-red-600 font-bold block">✗ تعذر تحميل الملف، جرّب ملفاً آخر.</span>}
                                            {pickedFile && pickedFile.kind === 'image' && <img src={pickedFile.content} class="h-24 rounded-lg border" />}
                                            {pickedFile && pickedFile.kind === 'pdf' && <span class="text-[11px] text-emerald-600 font-bold block">✓ تم اختيار ملف PDF بنجاح، سيتم عرضه داخل التطبيق.</span>}
                                            {pickedFile && pickedFile.kind === 'text' && <span class="text-[11px] text-emerald-600 font-bold block">✓ تم تحميل نص الملف بنجاح.</span>}
                                            {pickedFile && pickedFile.kind === 'other' && <span class="text-[11px] text-amber-600 font-bold block">⚠ هذا النوع لا يمكن معاينته داخل المتصفح مباشرة، لكن سيتم حفظه ويمكنك تنزيله لاحقاً.</span>}
                                        </div>
                                    ) : (
                                        <textarea value={fileTextContent} onChange={(e) => setFileTextContent(e.target.value)} placeholder="الصق أو اكتب نص المقال هنا..." class="w-full h-32 border p-3 rounded-xl text-sm" />
                                    )}

                                    <div class="flex justify-end gap-2">
                                        <button onClick={() => { setIsAddingFile(false); resetFilePicker(); }} class="px-4 py-2 text-slate-500">إلغاء</button>
                                        <button
                                            onClick={handleCreateFile}
                                            disabled={fileMode === 'upload' && filePickStatus === 'loading'}
                                            class={`px-5 py-2 rounded-xl font-bold text-white ${fileMode === 'upload' && filePickStatus === 'loading' ? 'bg-slate-300 cursor-not-allowed' : 'bg-primary-500'}`}
                                        >
                                            {fileMode === 'upload' && filePickStatus === 'loading' ? 'جارٍ التحميل...' : 'حفظ'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // ===================== شاشة تصفح ملف واحد + تحرير/ترجمة/حذف/حفظ =====================
            if (selectedUnit && viewingFile) {
                return (
                    <div class="fixed inset-0 bg-white dark:bg-slate-900 z-50 flex flex-col h-screen">
                        <header class="p-4 border-b dark:border-slate-700 flex justify-between items-center bg-slate-50 dark:bg-slate-800 gap-2">
                            <BackButton onClick={() => { setViewingFileId(null); setIsEditingText(false); }} label="رجوع لقائمة الملفات" />
                            <h3 class="font-bold text-slate-800 dark:text-slate-100 truncate">{viewingFile.name}</h3>
                            <button onClick={() => handleDeleteFile(selectedUnit.id, viewingFile.id)} class="text-slate-400 hover:text-red-500 flex items-center gap-1 text-xs font-bold shrink-0">
                                <i data-lucide="trash-2" class="w-4 h-4"></i> حذف
                            </button>
                        </header>
                        <div class="flex-1 overflow-y-auto p-6 max-w-2xl mx-auto space-y-5 w-full">
                            {/* الملف نفسه يُعرض دائماً هنا أولاً بحسب نوعه */}
                            {viewingFile.kind === 'text' && !isEditingText && (
                                <p class="text-lg leading-relaxed text-slate-700 dark:text-slate-200 select-text notebook-paper p-4 rounded-xl whitespace-pre-wrap">{viewingFile.content}</p>
                            )}
                            {viewingFile.kind === 'text' && isEditingText && (
                                <textarea
                                    value={editDraft}
                                    onChange={(e) => setEditDraft(e.target.value)}
                                    class="w-full h-64 text-lg leading-relaxed text-slate-700 notebook-paper p-4 rounded-xl border border-primary-300 focus:outline-none focus:ring-2 focus:ring-primary-400"
                                />
                            )}
                            {viewingFile.kind === 'image' && (
                                <img src={viewingFile.content} class="w-full rounded-xl border" />
                            )}
                            {viewingFile.kind === 'pdf' && (
                                <embed src={viewingFile.content} type="application/pdf" class="w-full h-[65vh] rounded-xl border" />
                            )}
                            {viewingFile.kind === 'other' && (
                                <div class="text-center p-6 bg-slate-50 rounded-xl space-y-3">
                                    <p class="text-sm text-slate-500">هذا النوع من الملفات لا يمكن معاينته مباشرة داخل المتصفح.</p>
                                    <a href={viewingFile.content} download={viewingFile.name} class="inline-block bg-primary-500 text-white text-xs px-4 py-2 rounded-lg font-bold">تنزيل الملف</a>
                                </div>
                            )}

                            {viewingFile.kind === 'text' && (
                                <div class="flex flex-wrap gap-2">
                                    {!isEditingText && (
                                        <>
                                            <button onClick={handleTranslateSelection} class="flex items-center gap-1.5 bg-blue-50 text-blue-600 px-4 py-2 rounded-xl text-xs font-bold">
                                                <i data-lucide="languages" class="w-4 h-4"></i> ترجمة الجزء المحدد
                                            </button>
                                            <button onClick={() => { setEditDraft(viewingFile.content); setIsEditingText(true); }} class="flex items-center gap-1.5 bg-slate-100 text-slate-700 px-4 py-2 rounded-xl text-xs font-bold">
                                                <i data-lucide="pencil" class="w-4 h-4"></i> تعديل النص (كتابة/حذف)
                                            </button>
                                        </>
                                    )}
                                    {isEditingText && (
                                        <>
                                            <button onClick={handleSaveTextEdit} class="flex items-center gap-1.5 bg-emerald-500 text-white px-4 py-2 rounded-xl text-xs font-bold">
                                                <i data-lucide="save" class="w-4 h-4"></i> حفظ تعديل النص
                                            </button>
                                            <button onClick={() => setIsEditingText(false)} class="flex items-center gap-1.5 bg-slate-100 text-slate-600 px-4 py-2 rounded-xl text-xs font-bold">
                                                إلغاء
                                            </button>
                                        </>
                                    )}
                                </div>
                            )}

                            <div class="bg-amber-50 dark:bg-amber-950/20 p-3 rounded-xl text-[11px] text-amber-700 dark:text-amber-400 border border-amber-100/50 dark:border-amber-900/30">
                                💡 حدد جزءاً من النص واضغط "ترجمة" لترجمته فوراً، اضغط "تعديل النص" للكتابة أو الحذف داخل المحتوى نفسه، أو استخدم لوحة الرسم أدناه لإضافة ملاحظات بخط اليد، ثم احفظ.
                            </div>
                            <div>
                                <h4 class="font-bold text-sm text-slate-600 dark:text-slate-300 mb-2">ملاحظاتي بخط اليد على الملف:</h4>
                                <AnnotationCanvas
                                    key={viewingFile.id}
                                    initialData={viewingFile.annotation || null}
                                    onSave={(dataUrl) => handleSaveAnnotation(selectedUnit.id, viewingFile.id, dataUrl)}
                                />
                            </div>
                        </div>
                    </div>
                );
            }

            // ===================== شاشة قائمة الوحدات =====================
            return (
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <BackButton onClick={onBack} />
                        <h2 class="text-xl font-black">{title}</h2>
                        <button onClick={() => setIsAddingUnit(true)} class="bg-primary-500 text-white text-xs px-3 py-1.5 rounded-xl font-bold">+ إضافة Unit</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {units.map(unit => (
                            <div key={unit.id} class="bg-white border border-slate-100 dark:bg-slate-800 dark:border-slate-700 p-5 rounded-2xl flex justify-between items-center">
                                <div>
                                    <h4 class="font-bold">{unit.name}</h4>
                                    <p class="text-xs text-slate-400 mt-1">{unit.files.length} ملفات مدرجة</p>
                                </div>
                                <div class="flex gap-2 items-center">
                                    <button onClick={() => { setSelectedUnitId(unit.id); resetFilePicker(); setIsAddingFile(true); }} class="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs px-3 py-1.5 rounded-lg">
                                        + أضف ملف
                                    </button>
                                    <button onClick={() => setSelectedUnitId(unit.id)} class="bg-primary-500 text-white text-xs px-4 py-1.5 rounded-lg">
                                        عرض
                                    </button>
                                    <button onClick={() => handleDeleteUnit(unit.id)} class="text-slate-300 hover:text-red-500">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        ))}
                        {units.length === 0 && <p class="text-xs text-slate-400 col-span-2 text-center py-6">لا توجد وحدات بعد. أضف أول Unit للبدء.</p>}
