                    </div>

                    {/* Add Unit popup */}
                    {isAddingUnit && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">إضافة Unit جديد</h3>
                                    <BackButton onClick={() => setIsAddingUnit(false)} label="إغلاق" />
                                </div>
                                <input type="text" placeholder="اسم الـ Unit..." value={unitName} onChange={(e) => setUnitName(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <div class="flex justify-end gap-2">
                                    <button onClick={() => setIsAddingUnit(false)} class="px-4 py-2 text-slate-500">إلغاء</button>
                                    <button onClick={handleCreateUnit} class="bg-primary-500 text-white px-5 py-2 rounded-xl font-bold">إنشاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }
        // ==========================================
        // 9. READING SCREEN
        // ==========================================
        function ReadingScreen({ sources, setSources, unitsNew, setUnitsNew, unitsRead, setUnitsRead, onAddStats, onBack }) {
            const [isAddingSource, setIsAddingSource] = useState(null);
            const [section, setSection] = useState(null); // null | 'new' | 'read'

            const [sourceName, setSourceName] = useState('');
            const [sourceUrl, setSourceUrl] = useState('');
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const handleSaveSource = () => {
                if (!sourceName.trim() || isAddingSource === null) return;
                const nextSources = [...sources];
                nextSources[isAddingSource] = { name: sourceName, url: sourceUrl };
                setSources(nextSources);
                setSourceName('');
                setSourceUrl('');
                setIsAddingSource(null);
            };

            if (section === 'new') {
                return <ReadingUnitsPage title="جديد" units={unitsNew} setUnits={setUnitsNew} onAddStats={onAddStats} onBack={() => setSection(null)} allowFinish={true} />;
            }
            if (section === 'read') {
                return <ReadingUnitsPage title="تم القراءة" units={unitsRead} setUnits={setUnitsRead} onAddStats={onAddStats} onBack={() => setSection(null)} allowFinish={false} />;
            }

            return (
                <div class="space-y-8">
                    <div class="flex items-center justify-between">
                        <BackButton onClick={onBack} />
                    </div>
                    <div>
                        <h2 class="text-2xl font-black">مصادر وقراءاتي اللغوية</h2>
                        <p class="text-sm text-slate-400">إدارة القراءة الذاتية وحفظ آخر تقدم</p>
                    </div>

                    {/* Sources top bar */}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {sources.map((src, i) => (
                            <div key={i} onClick={() => setIsAddingSource(i)} class="p-4 rounded-2xl border border-dashed border-slate-200 hover:border-primary-500 cursor-pointer text-center bg-slate-50/50 flex flex-col items-center justify-center min-h-[90px] transition-all">
                                {src ? (
                                    <>
                                        <h5 class="font-bold text-xs">{src.name}</h5>
                                        <a href={src.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} class="text-[10px] text-primary-500 underline mt-1 block overflow-hidden max-w-full text-ellipsis">{src.url}</a>
                                    </>
                                ) : (
                                    <span class="text-xs text-slate-400">+ أضف مصدر {i + 1}</span>
                                )}
                            </div>
                        ))}
                    </div>

                    {/* جديد / تم القراءة - نافذتان منفصلتان */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div onClick={() => setSection('new')} class="cursor-pointer bg-primary-50 dark:bg-primary-950/20 border-2 border-primary-200 dark:border-primary-800 p-6 rounded-2xl flex items-center justify-between hover:shadow-md transition-all">
                            <div>
                                <h3 class="font-bold text-lg text-primary-700 dark:text-primary-400">جديد</h3>
                                <p class="text-xs text-slate-400 mt-1">{unitsNew.length} وحدات قيد القراءة</p>
                            </div>
                            <i data-lucide="chevron-left" class="w-6 h-6 text-primary-400"></i>
                        </div>
                        <div onClick={() => setSection('read')} class="cursor-pointer bg-emerald-50 dark:bg-emerald-950/20 border-2 border-emerald-200 dark:border-emerald-800 p-6 rounded-2xl flex items-center justify-between hover:shadow-md transition-all">
                            <div>
                                <h3 class="font-bold text-lg text-emerald-700 dark:text-emerald-400">تم القراءة</h3>
                                <p class="text-xs text-slate-400 mt-1">{unitsRead.length} وحدات مكتملة</p>
                            </div>
                            <i data-lucide="chevron-left" class="w-6 h-6 text-emerald-400"></i>
                        </div>
                    </div>

                    {/* Add Source popup */}
                    {isAddingSource !== null && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">تحديد المصدر المرجعي</h3>
                                    <BackButton onClick={() => setIsAddingSource(null)} label="إغلاق" />
                                </div>
                                <input type="text" placeholder="اسم المصدر (مثلا: BBC)..." value={sourceName} onChange={(e) => setSourceName(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <input type="text" placeholder="الرابط المباشر..." value={sourceUrl} onChange={(e) => setSourceUrl(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <div class="flex justify-end gap-2">
                                    <button onClick={() => setIsAddingSource(null)} class="px-4 py-2 text-slate-500">إلغاء</button>
                                    <button onClick={handleSaveSource} class="bg-primary-500 text-white px-5 py-2 rounded-xl font-bold">حفظ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 10. WRITING SCREEN
        // ==========================================
        function WritingScreen({ topics, setWritingTopics, suggestions, setSuggestions, onAddStats, onBack }) {
            const [isAddingTopic, setIsAddingTopic] = useState(false);
            const [topicTitle, setTopicTitle] = useState('');
            const [newSuggestionText, setNewSuggestionText] = useState('');
            const [suggestionIndex, setSuggestionIndex] = useState(0);

            const [activeWriteTopic, setActiveWriteTopic] = useState(null);
            const [writeMode, setWriteMode] = useState(null); // null | 'hand' | 'keyboard'

            // Essay write text
            const [essayText, setEssayText] = useState('');
            const [essayDuration, setEssayDuration] = useState(10);
            const [isAnalysing, setIsAnalysing] = useState(false);
            const [analysisResult, setAnalysisResult] = useState(null);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const handleCreateTopic = (titleToUse = null) => {
                const finalTitle = titleToUse || topicTitle;
                if (!finalTitle.trim()) return;

                const newTopic = {
                    id: Date.now().toString(),
                    title: finalTitle,
                    duration: 10,
                    completed: false,
                    text: ''
                };

                setWritingTopics([...topics, newTopic]);
                setTopicTitle('');
                setIsAddingTopic(false);
            };

            const handleAddSuggestion = () => {
                if (!newSuggestionText.trim()) return;
                setSuggestions([...suggestions, { id: Date.now().toString(), text: newSuggestionText }]);
                setNewSuggestionText('');
            };

            const handleAcceptSuggestion = () => {
                if (suggestions.length === 0) return;
                handleCreateTopic(suggestions[suggestionIndex].text);
            };

            const handleAnalyzeText = () => {
                if (!essayText.trim()) return;
                setIsAnalysing(true);

                // Simulated AI NLP checker logic
                setTimeout(() => {
                    setAnalysisResult({
                        score: { grammar: '8/10', spelling: '9/10', style: 'Good' },
                        corrections: [
                            { original: 'I wants to learn english', correct: 'I want to learn English', explanation: 'استخدام صيغة الفعل الصحيحة للمفرد والجمع والاهتمام بالحروف الكبيرة.' }
                        ]
                    });
                    setIsAnalysing(false);
                    onAddStats(essayDuration); // Add writing minutes to statistics database
                }, 1500);
            };

            const openTopic = (topic) => {
                setActiveWriteTopic(topic);
                setWriteMode(null);
                setEssayText(topic.text || '');
                setAnalysisResult(null);
            };

            const closeEditor = () => {
                if (writeMode === 'keyboard') {
                    setWritingTopics(prev => prev.map(t => t.id === activeWriteTopic.id ? { ...t, text: essayText } : t));
                }
                setActiveWriteTopic(null);
                setWriteMode(null);
                setAnalysisResult(null);
            };

            return (
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <BackButton onClick={onBack} />
                    </div>
                    <div class="flex justify-between items-center">
                        <div>
                            <h2 class="text-2xl font-black">ممارسة الكتابة (Writing)</h2>
                            <p class="text-sm text-slate-400 mt-1">اكتب وتلقَّ تصحيحات نحوية فورية مع التقييم الذكي</p>
                        </div>
                        <button onClick={() => setIsAddingTopic(true)} class="bg-primary-500 text-white px-4 py-2 rounded-xl text-xs font-bold">
                            + إضافة موضوع
                        </button>
                    </div>

                    {/* Topics Grid Cards */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {topics.map(topic => (
                            <div key={topic.id} class="bg-white border border-slate-100 p-5 rounded-2xl flex justify-between items-center">
                                <div>
                                    <h4 class="font-bold text-slate-800">{topic.title}</h4>
                                    <p class="text-xs text-slate-400 mt-1">المدة المفترضة: {topic.duration} دقيقة</p>
                                </div>
                                <button onClick={() => openTopic(topic)} class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs px-4 py-2 rounded-xl font-bold">
                                    كتابة الآن
                                </button>
                            </div>
                        ))}
                    </div>

                    {/* Create topic modal popup - بنك اقتراحات المستخدم مع تصفح أمام/خلف (فقط، بدون حقل عنوان منفصل) */}
                    {isAddingTopic && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">إضافة موضوع كتابة جديد</h3>
                                    <BackButton onClick={() => setIsAddingTopic(false)} label="إغلاق" />
                                </div>

                                <div class="space-y-2 p-3 bg-slate-50 rounded-xl">
                                    <span class="text-xs text-slate-400 block font-bold">أضف اقتراحاتك، ثم تصفحها وحدد الموضوع الذي تريد إضافته:</span>
                                    <div class="flex gap-2">
                                        <input type="text" placeholder="أضف اقتراح موضوع جديد..." value={newSuggestionText} onChange={(e) => setNewSuggestionText(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handleAddSuggestion(); }} class="flex-1 border p-2.5 rounded-lg text-xs" />
                                        <button onClick={handleAddSuggestion} class="bg-slate-700 text-white px-3 rounded-lg text-xs font-bold">حفظ</button>
                                    </div>

                                    {suggestions.length > 0 ? (
                                        <div class="flex items-center gap-2 pt-2">
                                            <button onClick={() => setSuggestionIndex(i => (i - 1 + suggestions.length) % suggestions.length)} class="p-2 bg-white border rounded-full">
                                                <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                            </button>
                                            <div class="flex-1 text-center bg-white border rounded-xl py-3 px-2 font-bold text-sm">
                                                {suggestions[suggestionIndex]?.text}
                                            </div>
                                            <button onClick={() => setSuggestionIndex(i => (i + 1) % suggestions.length)} class="p-2 bg-white border rounded-full">
                                                <i data-lucide="chevron-left" class="w-4 h-4"></i>
                                            </button>
                                            <button onClick={handleAcceptSuggestion} title="إضافة هذا الاقتراح كموضوع" class="p-2 bg-emerald-500 text-white rounded-full">
                                                <i data-lucide="check" class="w-4 h-4"></i>
                                            </button>
                                        </div>
                                    ) : (
                                        <p class="text-[11px] text-slate-400 text-center py-2">لا توجد اقتراحات محفوظة بعد، أضف أول اقتراح لك أعلاه.</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* اختيار طريقة الكتابة: باليد أو بلوحة المفاتيح */}
                    {activeWriteTopic && writeMode === null && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-sm rounded-3xl p-6 space-y-4 text-center">
                                <div class="flex justify-between items-center">
                                    <BackButton onClick={() => setActiveWriteTopic(null)} label="إغلاق" />
                                    <h3 class="text-lg font-bold">{activeWriteTopic.title}</h3>
                                    <span class="w-10"></span>
                                </div>
                                <p class="text-xs text-slate-400">اختر طريقة الكتابة المفضلة لديك:</p>
                                <div class="grid grid-cols-2 gap-3">
                                    <button onClick={() => setWriteMode('hand')} class="p-5 bg-slate-50 hover:bg-primary-50 border rounded-2xl flex flex-col items-center gap-2">
                                        <i data-lucide="pen-tool" class="w-6 h-6 text-primary-500"></i>
                                        <span class="text-xs font-bold">الكتابة باليد</span>
                                    </button>
                                    <button onClick={() => setWriteMode('keyboard')} class="p-5 bg-slate-50 hover:bg-primary-50 border rounded-2xl flex flex-col items-center gap-2">
                                        <i data-lucide="keyboard" class="w-6 h-6 text-primary-500"></i>
                                        <span class="text-xs font-bold">الكتابة بلوحة المفاتيح</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* وضع الكتابة باليد (رسم حر) */}
                    {activeWriteTopic && writeMode === 'hand' && (
                        <div class="fixed inset-0 bg-white z-50 flex flex-col h-screen">
                            <header class="p-4 border-b flex justify-between items-center bg-slate-50">
                                <BackButton onClick={() => setWriteMode(null)} />
                                <h3 class="font-bold text-slate-800">{activeWriteTopic.title} - كتابة باليد</h3>
                                <button onClick={closeEditor} class="bg-slate-200 px-4 py-1.5 rounded-full text-xs font-bold">إغلاق</button>
                            </header>
                            <div class="flex-1 overflow-y-auto p-6 max-w-3xl w-full mx-auto space-y-4">
                                <div class="flex gap-4 items-center">
                                    <span class="text-xs text-slate-400 font-bold shrink-0">مدة الجلسة بالدقائق:</span>
                                    <div class="flex gap-1">
                                        {[5, 10, 20, 30].map(mins => (
                                            <button key={mins} onClick={() => setEssayDuration(mins)} class={`px-3 py-1 rounded-lg text-xs font-bold ${essayDuration === mins ? 'bg-primary-500 text-white' : 'bg-slate-100 text-slate-600'}`}>{mins} د</button>
                                        ))}
                                    </div>
                                </div>
                                <AnnotationCanvas key={activeWriteTopic.id} height={420} onSave={() => { onAddStats(essayDuration); alert('تم حفظ ما كتبته بخط يدك، وأُضيفت دقائق الجلسة إلى إحصائياتك.'); }} />
                            </div>
                        </div>
                    )}

                    {/* Simulated Advanced Word processor writing desk with AI assessment tool */}
                    {activeWriteTopic && writeMode === 'keyboard' && (
                        <div class="fixed inset-0 bg-white z-50 flex flex-col h-screen">
                            <header class="p-4 border-b flex justify-between items-center bg-slate-50">
                                <BackButton onClick={() => setWriteMode(null)} />
                                <div class="text-center">
                                    <h3 class="font-bold text-slate-800">{activeWriteTopic.title}</h3>
                                    <span class="text-xs text-slate-400">محرر الكتابة السلس مع المصحح النحوي الفوري</span>
                                </div>
                                <button onClick={closeEditor} class="bg-slate-200 px-4 py-1.5 rounded-full text-xs font-bold">حفظ وإغلاق</button>
                            </header>

                            <div class="flex-1 overflow-y-auto p-6 max-w-3xl w-full mx-auto space-y-6">
                                <div class="flex gap-4 items-center">
                                    <span class="text-xs text-slate-400 font-bold shrink-0">مدة الجلسة بالدقائق:</span>
                                    <div class="flex gap-1">
                                        {[5, 10, 20, 30].map(mins => (
                                            <button key={mins} onClick={() => setEssayDuration(mins)} class={`px-3 py-1 rounded-lg text-xs font-bold ${essayDuration === mins ? 'bg-primary-500 text-white' : 'bg-slate-100 text-slate-600'}`}>{mins} د</button>
                                        ))}
                                    </div>
                                </div>

                                <textarea
                                    value={essayText}
                                    onChange={(e) => setEssayText(e.target.value)}
                                    placeholder="ابدأ الكتابة هنا باللغة الإنجليزية..."
                                    class="w-full h-80 border-0 focus:ring-0 p-4 rounded-2xl bg-slate-50 text-slate-800 text-md leading-relaxed notebook-paper focus:outline-none"
                                />

                                {analysisResult && (
                                    <div class="bg-slate-50 p-5 rounded-2xl border border-slate-200 space-y-4">
                                        <h4 class="font-bold text-primary-600">تقرير المراجعة والتدقيق النحوي</h4>
                                        <div class="grid grid-cols-3 gap-2 text-center text-xs">
                                            <div class="p-2.5 bg-white border rounded-xl"><span class="block text-slate-400">القواعد</span><strong class="font-bold text-slate-700">{analysisResult.score.grammar}</strong></div>
                                            <div class="p-2.5 bg-white border rounded-xl"><span class="block text-slate-400">الإملاء</span><strong class="font-bold text-slate-700">{analysisResult.score.spelling}</strong></div>
                                            <div class="p-2.5 bg-white border rounded-xl"><span class="block text-slate-400">الأسلوب العام</span><strong class="font-bold text-primary-500">{analysisResult.score.style}</strong></div>
                                        </div>
                                        <div class="space-y-2.5 pt-2">
                                            {analysisResult.corrections.map((corr, idx) => (
                                                <div key={idx} class="p-3 bg-white rounded-xl border border-slate-100 text-xs space-y-1">
                                                    <p class="text-red-500 line-through">❌ {corr.original}</p>
                                                    <p class="text-emerald-600 font-bold">✅ {corr.correct}</p>
                                                    <p class="text-slate-500 pt-1 border-t mt-1 font-semibold">{corr.explanation}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>

                            <footer class="p-4 border-t bg-slate-50 flex justify-between items-center">
                                <span class="text-xs text-slate-400">ميزة الحفظ التلقائي تعمل تلقائياً</span>
                                <button onClick={handleAnalyzeText} disabled={isAnalysing} class="bg-primary-500 hover:bg-primary-600 text-white px-6 py-2 rounded-xl font-bold text-xs shadow-md">
                                    {isAnalysing ? 'جاري الفحص النحوي...' : '✔ فحص وتحقق بالذكاء الاصطناعي'}
                                </button>
                            </footer>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 11. LISTENING SCREEN
        // ==========================================
        function ListeningScreen({ sources, setSources, unitsNew, setUnitsNew, unitsCompleted, setUnitsCompleted, onAddStats, onBack }) {
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [isAddingSource, setIsAddingSource] = useState(null);
            const [isAddingUnit, setIsAddingUnit] = useState(false);
            const [isAddingLesson, setIsAddingLesson] = useState(false);

            const [sourceName, setSourceName] = useState('');
            const [sourceUrl, setSourceUrl] = useState('');
            const [unitName, setUnitName] = useState('');
            const [lessonName, setLessonName] = useState('');
            const [lessonUrl, setLessonUrl] = useState('');
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const handleSaveSource = () => {
                if (!sourceName.trim() || isAddingSource === null) return;
                const nextSources = [...sources];
                nextSources[isAddingSource] = { name: sourceName, url: sourceUrl };
                setSources(nextSources);
                setSourceName('');
                setSourceUrl('');
                setIsAddingSource(null);
            };

            const handleCreateUnit = () => {
                if (!unitName.trim()) return;
                const newUnit = { id: Date.now().toString(), name: unitName, lessons: [] };
                setUnitsNew([...unitsNew, newUnit]);
                setUnitName('');
                setIsAddingUnit(false);
            };

            const handleCreateLesson = () => {
                if (!lessonName.trim() || !selectedUnit) return;
                const newLesson = {
                    id: Date.now().toString(),
                    name: lessonName,
                    url: lessonUrl,
                    completed: false // المستخدم هو من يحدد إن تم الاستماع أم لا، وليس تلقائياً
                };

                setUnitsNew(prev => prev.map(u => {
                    if (u.id === selectedUnit.id) {
                        return { ...u, lessons: [...u.lessons, newLesson] };
                    }
                    return u;
                }));

                setLessonName('');
                setLessonUrl('');
                setIsAddingLesson(false);
            };

            // المستخدم يحدد بنفسه إن تم الاستماع أم لا (تبديل يدوي وليس علامة تلقائية)
            const handleToggleListen = (unitId, lessonId) => {
                let justCompleted = false;
                setUnitsNew(prev => prev.map(u => {
                    if (u.id !== unitId) return u;
                    return {
                        ...u,
                        lessons: u.lessons.map(l => {
                            if (l.id !== lessonId) return l;
                            justCompleted = !l.completed;
                            return { ...l, completed: !l.completed };
                        })
                    };
                }));
                if (justCompleted) onAddStats(10); // إضافة 10 دقائق استماع عند التأكيد اليدوي فقط
            };

            return (
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <BackButton onClick={onBack} />
                    </div>
                    <div>
                        <h2 class="text-2xl font-black">مصادر وقسم الاستماع (Listening)</h2>
                        <p class="text-sm text-slate-400">استمع وحسّن مهارات الفهم التلقائي لديك</p>
                    </div>

                    {/* Rounded discs style sources representation */}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 py-4">
                        {sources.map((src, idx) => {
                            const discColors = [
                                'bg-blue-500 text-blue-100',
                                'bg-emerald-500 text-emerald-100',
                                'bg-orange-500 text-orange-100',
                                'bg-purple-500 text-purple-100'
                            ];
                            return (
                                <div key={idx} onClick={() => setIsAddingSource(idx)} class={`${discColors[idx]} w-28 h-28 rounded-full flex flex-col items-center justify-center text-center p-3 cursor-pointer hover:rotate-12 hover:scale-105 transition-all shadow-md mx-auto`}>
                                    {src ? (
                                        <span class="font-bold text-[10px] leading-tight block">{src.name}</span>
                                    ) : (
                                        <span class="text-[10px] font-bold">+ أضف أسطوانة {idx + 1}</span>
                                    )}
                                </div>
                            );
                        })}
                    </div>
                    {sources.some(s => s) && (
                        <div class="flex flex-wrap gap-2 justify-center -mt-2">
                            {sources.map((src, idx) => src && (
                                <a key={idx} href={src.url} target="_blank" rel="noopener noreferrer" class="text-[10px] text-primary-500 underline">{src.name} ↗</a>
                            ))}
                        </div>
                    )}

                    {/* Units section */}
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-lg">وحدات الاستماع الخاصة بي</h3>
                            <button onClick={() => setIsAddingUnit(true)} class="bg-primary-500 text-white text-xs px-3 py-1.5 rounded-xl font-bold">
                                + إضافة Unit
                            </button>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {unitsNew.map(unit => (
                                <div key={unit.id} class="bg-white border border-slate-100 p-5 rounded-2xl flex justify-between items-center">
                                    <div>
                                        <h4 class="font-bold">{unit.name}</h4>
                                        <p class="text-xs text-slate-400 font-inter mt-1">{unit.lessons.length} دروس مسجلة</p>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onClick={() => { setSelectedUnit(unit); setIsAddingLesson(true); }} class="bg-slate-100 text-slate-700 text-xs px-3 py-1.5 rounded-lg">+ درس</button>
                                        <button onClick={() => { setSelectedUnit(unit); }} class="bg-primary-500 text-white text-xs px-4 py-1.5 rounded-lg">عرض</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Add Source popup */}
                    {isAddingSource !== null && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">تحديد المصدر المرجعي للقرص</h3>
                                    <BackButton onClick={() => setIsAddingSource(null)} label="إغلاق" />
                                </div>
                                <input type="text" placeholder="اسم المصدر (مثلا: BBC Listen)..." value={sourceName} onChange={(e) => setSourceName(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <input type="text" placeholder="الرابط..." value={sourceUrl} onChange={(e) => setSourceUrl(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <div class="flex justify-end gap-2">
                                    <button onClick={() => setIsAddingSource(null)} class="px-4 py-2 text-slate-500">إلغاء</button>
                                    <button onClick={handleSaveSource} class="bg-primary-500 text-white px-5 py-2 rounded-xl font-bold">حفظ القرص</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Unit popup */}
                    {isAddingUnit && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">إضافة وحدة استماع جديد</h3>
                                    <BackButton onClick={() => setIsAddingUnit(false)} label="إغلاق" />
                                </div>
                                <input type="text" placeholder="اسم الوحدة..." value={unitName} onChange={(e) => setUnitName(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <div class="flex justify-end gap-2">
                                    <button onClick={() => setIsAddingUnit(false)} class="px-4 py-2 text-slate-500">إلغاء</button>
                                    <button onClick={handleCreateUnit} class="bg-primary-500 text-white px-5 py-2 rounded-xl font-bold">إنشاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Lesson popup */}
                    {isAddingLesson && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">إضافة درس صوتي للـ {selectedUnit?.name}</h3>
                                    <BackButton onClick={() => setIsAddingLesson(false)} label="إغلاق" />
                                </div>
                                <input type="text" placeholder="اسم الحلقة..." value={lessonName} onChange={(e) => setLessonName(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <input type="text" placeholder="رابط الملف الصوتي..." value={lessonUrl} onChange={(e) => setLessonUrl(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <div class="flex justify-end gap-2">
                                    <button onClick={() => setIsAddingLesson(false)} class="px-4 py-2 text-slate-500">إلغاء</button>
                                    <button onClick={handleCreateLesson} class="bg-primary-500 text-white px-5 py-2 rounded-xl font-bold">حفظ الدرس</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* View unit lessons detail list */}
                    {selectedUnit && !isAddingLesson && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-lg h-[70vh] rounded-3xl overflow-hidden flex flex-col">
                                <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                                    <BackButton onClick={() => setSelectedUnit(null)} />
                                    <h3 class="font-bold">دروس {selectedUnit.name}</h3>
                                    <span class="w-10"></span>
                                </div>
                                <div class="flex-1 overflow-y-auto p-5 space-y-3">
                                    {unitsNew.find(u => u.id === selectedUnit.id)?.lessons.map(lesson => (
                                        <div key={lesson.id} class="p-4 bg-slate-50 rounded-xl flex justify-between items-center gap-2">
                                            <div>
                                                <span class="font-bold text-sm block">{lesson.name}</span>
                                                {lesson.url ? (
                                                    <a href={lesson.url} target="_blank" rel="noopener noreferrer" class="text-[10px] text-primary-500 underline mt-0.5 block">{lesson.url}</a>
                                                ) : (
                                                    <span class="text-[10px] text-slate-400 mt-0.5 block">بدون رابط</span>
                                                )}
                                            </div>
                                            <button onClick={() => handleToggleListen(selectedUnit.id, lesson.id)} class={`text-xs px-3 py-1.5 rounded-lg font-bold shrink-0 ${lesson.completed ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                                                {lesson.completed ? '✓ تم الاستماع' : 'لم يُستمع بعد'}
                                            </button>
                                        </div>
                                    ))}
                                    {unitsNew.find(u => u.id === selectedUnit.id)?.lessons.length === 0 && (
                                        <p class="text-xs text-slate-400 text-center py-8">لا توجد دروس في هذه الوحدة بعد.</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // مؤقت بسيط قابل لإعادة الاستخدام لجلسات التحدث/الممارسة الحرة
        function SimpleTimer({ onCommit }) {
            const [running, setRunning] = useState(false);
            const [seconds, setSeconds] = useState(0);
            const intervalRef = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [running]);

            useEffect(() => {
                if (running) intervalRef.current = setInterval(() => setSeconds(s => s + 1), 1000);
                else clearInterval(intervalRef.current);
                return () => clearInterval(intervalRef.current);
            }, [running]);

            const toggle = () => {
                if (running && seconds > 0 && onCommit) onCommit(seconds / 60);
                setRunning(!running);
            };

            const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
            const ss = String(seconds % 60).padStart(2, '0');

            return (
                <div class="flex items-center gap-2">
                    <span class="text-xs font-inter text-slate-500">{mm}:{ss}</span>
                    <button onClick={toggle} class={`w-7 h-7 rounded-full flex items-center justify-center text-white ${running ? 'bg-red-500' : 'bg-primary-500'}`}>
                        <i data-lucide={running ? 'pause' : 'play'} class="w-3.5 h-3.5"></i>
                    </button>
                </div>
            );
        }

        // مربع مصدر (اسم + رابط) قابل لإعادة الاستخدام في التحدث والـ Shadowing
        function SourceBox({ src, onSave }) {
            const [isEditing, setIsEditing] = useState(false);
            const [name, setName] = useState(src?.name || '');
            const [url, setUrl] = useState(src?.url || '');
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const save = () => {
                if (!name.trim()) return;
                onSave({ name, url });
                setIsEditing(false);
            };

            return (
                <div class="p-4 rounded-2xl border border-slate-200 bg-white dark:bg-slate-800 dark:border-slate-700 min-h-[90px] flex flex-col justify-center">
                    {!isEditing ? (
                        src ? (
                            <div class="flex justify-between items-center">
                                <div>
                                    <h5 class="font-bold text-xs">{src.name}</h5>
                                    <a href={src.url} target="_blank" rel="noopener noreferrer" class="text-[10px] text-primary-500 underline block mt-1">{src.url || 'بدون رابط'}</a>
                                </div>
                                <button onClick={() => setIsEditing(true)} class="text-slate-300 hover:text-primary-500"><i data-lucide="pencil" class="w-4 h-4"></i></button>
                            </div>
                        ) : (
                            <div onClick={() => setIsEditing(true)} class="cursor-pointer text-center text-xs text-slate-400">+ أضف مصدر (اسم ورابط)</div>
                        )
                    ) : (
                        <div class="space-y-2">
                            <input type="text" placeholder="الاسم..." value={name} onChange={(e) => setName(e.target.value)} class="w-full border p-2 rounded-lg text-xs" />
                            <input type="text" placeholder="الرابط..." value={url} onChange={(e) => setUrl(e.target.value)} class="w-full border p-2 rounded-lg text-xs" />
                            <div class="flex justify-end gap-2">
                                <button onClick={() => setIsEditing(false)} class="text-[11px] text-slate-500">إلغاء</button>
                                <button onClick={save} class="bg-primary-500 text-white text-[11px] px-3 py-1 rounded-lg font-bold">حفظ</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 12. SPEAKING SCREEN
        // ==========================================
        function SpeakingScreen({ sources, setSources, suggestions, setSuggestions, onAddStats, onBack }) {
            const [newSuggestionText, setNewSuggestionText] = useState('');
            const [browseIndex, setBrowseIndex] = useState(0);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const pending = suggestions.filter(s => !s.done);
            const completed = suggestions.filter(s => s.done);
            const safeIndex = pending.length ? browseIndex % pending.length : 0;
            const current = pending[safeIndex];

            const updateSource = (idx, value) => {
                const next = [...sources];
                next[idx] = value;
                setSources(next);
            };

            const handleAddSuggestion = () => {
                if (!newSuggestionText.trim()) return;
                setSuggestions([...suggestions, { id: Date.now().toString(), text: newSuggestionText, done: false }]);
                setNewSuggestionText('');
            };

            const handleMarkDone = () => {
                if (!current) return;
                setSuggestions(prev => prev.map(s => s.id === current.id ? { ...s, done: true } : s));
                onAddStats(1); // تسجيل نشاط تحدث عند إتمام موضوع
                setBrowseIndex(0);
            };

            return (
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <BackButton onClick={onBack} />
                    </div>
                    <div>
                        <h2 class="text-2xl font-black">قسم التحدث (Speaking)</h2>
                        <p class="text-sm text-slate-400 mt-1">مارس التحدث الذاتي وتتبّع دقائق حديثك بانتظام</p>
                    </div>

                    {/* مصدران بالاسم والرابط */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        <SourceBox src={sources[0]} onSave={(v) => updateSource(0, v)} />
                        <SourceBox src={sources[1]} onSave={(v) => updateSource(1, v)} />
                    </div>

                    {/* بنك المقترحات */}
                    <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl p-5 space-y-3">
                        <h3 class="font-bold text-slate-700 dark:text-slate-200">مقترحات مواضيع التحدث</h3>
                        <div class="flex gap-2">
                            <input type="text" value={newSuggestionText} onChange={(e) => setNewSuggestionText(e.target.value)} placeholder="أضف مقترح موضوع جديد..." class="flex-1 border p-2.5 rounded-lg text-xs" />
                            <button onClick={handleAddSuggestion} class="bg-primary-500 text-white px-4 rounded-lg text-xs font-bold">حفظ</button>
                        </div>

                        {current ? (
                            <div class="bg-slate-50 dark:bg-slate-900 rounded-2xl p-5 space-y-4">
                                <div class="flex items-center justify-between">
                                    <button onClick={() => setBrowseIndex(i => (i - 1 + pending.length) % pending.length)} class="p-2 bg-white border rounded-full"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                                    <p class="font-bold text-center flex-1 px-3">{current.text}</p>
                                    <button onClick={() => setBrowseIndex(i => (i + 1) % pending.length)} class="p-2 bg-white border rounded-full"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                                </div>
                                <div class="flex items-center justify-between">
                                    <SimpleTimer onCommit={(mins) => onAddStats(mins)} />
                                    <label class="flex items-center gap-2 cursor-pointer bg-white border rounded-xl px-3 py-1.5">
                                        <input type="checkbox" checked={false} onChange={handleMarkDone} class="w-4 h-4 accent-primary-500" />
                                        <span class="text-xs font-bold">أكملت هذا الموضوع</span>
                                    </label>
                                </div>
                            </div>
                        ) : (
                            <p class="text-xs text-slate-400 text-center py-6">لا توجد مقترحات قيد التنفيذ حالياً، أضف مقترحاً جديداً للبدء.</p>
                        )}
                    </div>

                    {/* المكتملة */}
                    {completed.length > 0 && (
                        <div class="space-y-2">
                            <h4 class="font-bold text-sm text-slate-500">مواضيع أكملتها ✅</h4>
                            {completed.map(s => (
                                <div key={s.id} class="p-3 bg-emerald-50 dark:bg-emerald-950/20 rounded-xl text-xs text-emerald-700 dark:text-emerald-400 flex items-center gap-2">
                                    <i data-lucide="check-circle" class="w-4 h-4"></i> {s.text}
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 13. SHADOWING SCREEN
        // ==========================================
        function ShadowingScreen({ sources, setSources, unitsNew, setUnitsNew, onAddStats, onBack }) {
            const [selectedUnit, setSelectedUnit] = useState(null);
            const [isAddingUnit, setIsAddingUnit] = useState(false);
            const [isAddingLesson, setIsAddingLesson] = useState(false);
            const [unitName, setUnitName] = useState('');
            const [lessonName, setLessonName] = useState('');
            const [lessonUrl, setLessonUrl] = useState('');
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const updateSource = (idx, value) => {
                const next = [...sources];
                next[idx] = value;
                setSources(next);
            };

            const handleCreateUnit = () => {
                if (!unitName.trim()) return;
                setUnitsNew([...unitsNew, { id: Date.now().toString(), name: unitName, lessons: [] }]);
                setUnitName('');
                setIsAddingUnit(false);
            };

            const handleCreateLesson = () => {
                if (!lessonName.trim() || !selectedUnit) return;
                const newLesson = { id: Date.now().toString(), name: lessonName, url: lessonUrl, completed: false };
                setUnitsNew(prev => prev.map(u => u.id === selectedUnit.id ? { ...u, lessons: [...u.lessons, newLesson] } : u));
                setLessonName(''); setLessonUrl('');
                setIsAddingLesson(false);
            };

            const handleToggleShadow = (unitId, lessonId) => {
                let justCompleted = false;
                setUnitsNew(prev => prev.map(u => {
                    if (u.id !== unitId) return u;
                    return { ...u, lessons: u.lessons.map(l => { if (l.id !== lessonId) return l; justCompleted = !l.completed; return { ...l, completed: !l.completed }; }) };
                }));
                if (justCompleted) onAddStats(10);
            };

            return (
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <BackButton onClick={onBack} />
                    </div>
                    <div>
                        <h2 class="text-2xl font-black">تقنية الـ Shadowing</h2>
                        <p class="text-sm text-slate-400 mt-1">طابق نطق المتحدثين الأصليين كلمة بكلمة</p>
                    </div>

                    {/* 4 مستطيلات مصدر (اسم + رابط) */}
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {sources.map((src, idx) => (
                            <SourceBox key={idx} src={src} onSave={(v) => updateSource(idx, v)} />
                        ))}
                    </div>

                    {/* نظام Unit */}
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-lg">وحدات الـ Shadowing</h3>
                            <button onClick={() => setIsAddingUnit(true)} class="bg-primary-500 text-white text-xs px-3 py-1.5 rounded-xl font-bold">+ إضافة Unit</button>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {unitsNew.map(unit => (
                                <div key={unit.id} class="bg-white border border-slate-100 dark:bg-slate-800 dark:border-slate-700 p-5 rounded-2xl flex justify-between items-center">
                                    <div>
                                        <h4 class="font-bold">{unit.name}</h4>
                                        <p class="text-xs text-slate-400 font-inter mt-1">{unit.lessons.length} دروس مسجلة</p>
                                    </div>
                                    <div class="flex gap-2">
                                        <button onClick={() => { setSelectedUnit(unit); setIsAddingLesson(true); }} class="bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-200 text-xs px-3 py-1.5 rounded-lg">+ درس</button>
                                        <button onClick={() => setSelectedUnit(unit)} class="bg-primary-500 text-white text-xs px-4 py-1.5 rounded-lg">عرض</button>
                                    </div>
                                </div>
                            ))}
                            {unitsNew.length === 0 && <p class="text-xs text-slate-400 col-span-2 text-center py-6">لا توجد وحدات بعد.</p>}
                        </div>
                    </div>

                    {/* Add Unit popup */}
                    {isAddingUnit && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">إضافة وحدة Shadowing</h3>
                                    <BackButton onClick={() => setIsAddingUnit(false)} label="إغلاق" />
                                </div>
                                <input type="text" placeholder="اسم الوحدة..." value={unitName} onChange={(e) => setUnitName(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <div class="flex justify-end gap-2">
                                    <button onClick={() => setIsAddingUnit(false)} class="px-4 py-2 text-slate-500">إلغاء</button>
                                    <button onClick={handleCreateUnit} class="bg-primary-500 text-white px-5 py-2 rounded-xl font-bold">إنشاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Lesson popup */}
                    {isAddingLesson && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">إضافة درس لـ {selectedUnit?.name}</h3>
                                    <BackButton onClick={() => setIsAddingLesson(false)} label="إغلاق" />
                                </div>
                                <input type="text" placeholder="اسم الدرس..." value={lessonName} onChange={(e) => setLessonName(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <input type="text" placeholder="الرابط..." value={lessonUrl} onChange={(e) => setLessonUrl(e.target.value)} class="w-full border p-3 rounded-xl text-sm" />
                                <div class="flex justify-end gap-2">
                                    <button onClick={() => setIsAddingLesson(false)} class="px-4 py-2 text-slate-500">إلغاء</button>
                                    <button onClick={handleCreateLesson} class="bg-primary-500 text-white px-5 py-2 rounded-xl font-bold">حفظ الدرس</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* View unit lessons detail list */}
                    {selectedUnit && !isAddingLesson && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-lg h-[70vh] rounded-3xl overflow-hidden flex flex-col">
                                <div class="p-5 border-b flex justify-between items-center bg-slate-50">
                                    <BackButton onClick={() => setSelectedUnit(null)} />
                                    <h3 class="font-bold">دروس {selectedUnit.name}</h3>
                                    <span class="w-10"></span>
                                </div>
                                <div class="flex-1 overflow-y-auto p-5 space-y-3">
                                    {unitsNew.find(u => u.id === selectedUnit.id)?.lessons.map(lesson => (
                                        <div key={lesson.id} class="p-4 bg-slate-50 rounded-xl flex justify-between items-center gap-2">
                                            <div>
                                                <span class="font-bold text-sm block">{lesson.name}</span>
                                                {lesson.url ? (
                                                    <a href={lesson.url} target="_blank" rel="noopener noreferrer" class="text-[10px] text-primary-500 underline mt-0.5 block">{lesson.url}</a>
                                                ) : (
                                                    <span class="text-[10px] text-slate-400 mt-0.5 block">بدون رابط</span>
                                                )}
                                            </div>
                                            <button onClick={() => handleToggleShadow(selectedUnit.id, lesson.id)} class={`text-xs px-3 py-1.5 rounded-lg font-bold shrink-0 ${lesson.completed ? 'bg-emerald-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                                                {lesson.completed ? '✓ تم' : 'لم يكتمل'}
                                            </button>
                                        </div>
                                    ))}
                                    {unitsNew.find(u => u.id === selectedUnit.id)?.lessons.length === 0 && (
                                        <p class="text-xs text-slate-400 text-center py-8">لا توجد دروس في هذه الوحدة بعد.</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // 14. OTHER CUSTOM SUB-SCREEN (أخرى)
        // ==========================================
        function OtherScreen({ elements, setElements, onBack }) {
            const [isAdding, setIsAdding] = useState(false);

            // القسم الأول: اسم النص أو صورة
            const [part1Type, setPart1Type] = useState('text'); // text | image
            const [part1Text, setPart1Text] = useState('');
            const [part1Image, setPart1Image] = useState(null);

            // القسم الثاني: اسم + (تسجيل صوتي أو رابط)
            const [part2Name, setPart2Name] = useState('');
            const [part2Mode, setPart2Mode] = useState('link'); // link | audio
            const [part2Link, setPart2Link] = useState('');
            const [part2Audio, setPart2Audio] = useState(null);

            const fileInputRef = useRef(null);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            const handlePart1ImagePick = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => setPart1Image(reader.result);
                reader.readAsDataURL(file);
            };

            const resetForm = () => {
                setPart1Type('text'); setPart1Text(''); setPart1Image(null);
                setPart2Name(''); setPart2Mode('link'); setPart2Link(''); setPart2Audio(null);
            };

            const handleCreateElement = () => {
                if (!part1Text.trim() && !part1Image) return;
                const newElem = {
                    id: Date.now().toString(),
                    part1: { type: part1Type, value: part1Type === 'image' ? part1Image : part1Text },
                    part2: { name: part2Name, mode: part2Mode, value: part2Mode === 'audio' ? part2Audio : part2Link },
                    date: new Date().toLocaleDateString()
                };
                setElements([newElem, ...elements]);
                resetForm();
                setIsAdding(false);
            };

            const handleDeleteElement = (id) => {
                setElements(elements.filter(e => e.id !== id));
            };

            return (
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <BackButton onClick={onBack} />
                    </div>
                    <div class="flex justify-between items-center">
                        <h3 class="font-bold text-lg">عناصر وملاحظات حرة أخرى</h3>
                        <button onClick={() => setIsAdding(true)} class="bg-primary-500 text-white text-xs px-3 py-1.5 rounded-xl font-bold">+ إضافة عنصر</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {elements.map(elem => (
                            <div key={elem.id} class="bg-white border border-slate-100 dark:bg-slate-800 dark:border-slate-700 p-5 rounded-2xl shadow-sm space-y-3">
                                <div class="flex justify-between items-start">
                                    <div class="flex-1">
                                        {elem.part1.type === 'image' ? (
                                            <img src={elem.part1.value} class="h-24 rounded-xl border" />
                                        ) : (
                                            <h4 class="font-bold text-slate-800 dark:text-slate-100">{elem.part1.value}</h4>
                                        )}
                                    </div>
                                    <button onClick={() => handleDeleteElement(elem.id)} class="text-slate-300 hover:text-red-500 shrink-0">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                                {elem.part2?.name && (
                                    <div class="pt-3 border-t border-slate-50 dark:border-slate-700">
                                        <p class="text-xs font-bold text-slate-500 mb-1">{elem.part2.name}</p>
                                        {elem.part2.mode === 'audio' && elem.part2.value ? (
                                            <audio controls src={elem.part2.value} class="w-full h-8"></audio>
                                        ) : elem.part2.value ? (
                                            <a href={elem.part2.value} target="_blank" rel="noopener noreferrer" class="text-xs text-primary-500 underline">{elem.part2.value}</a>
                                        ) : null}
                                    </div>
                                )}
                                <span class="text-[10px] text-slate-400 block pt-1">{elem.date}</span>
                            </div>
                        ))}
                        {elements.length === 0 && <p class="text-xs text-slate-400 col-span-2 text-center py-8">لا توجد عناصر بعد.</p>}
                    </div>

                    {isAdding && (
                        <div class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
                            <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4 max-h-[85vh] overflow-y-auto">
                                <div class="flex justify-between items-center">
                                    <h3 class="text-lg font-bold">إضافة عنصر حر</h3>
                                    <BackButton onClick={() => setIsAdding(false)} label="إغلاق" />
                                </div>

                                {/* القسم الأول: اسم/نص أو صورة */}
                                <div class="space-y-2 p-3 bg-slate-50 rounded-xl">
                                    <span class="text-[11px] font-bold text-slate-500 block">القسم الأول: اسم النص أو صورة</span>
                                    <div class="flex gap-2">
                                        <button onClick={() => setPart1Type('text')} class={`flex-1 py-2 rounded-lg text-xs font-bold ${part1Type === 'text' ? 'bg-primary-500 text-white' : 'bg-white text-slate-600 border'}`}>نص</button>
                                        <button onClick={() => setPart1Type('image')} class={`flex-1 py-2 rounded-lg text-xs font-bold ${part1Type === 'image' ? 'bg-primary-500 text-white' : 'bg-white text-slate-600 border'}`}>صورة</button>
                                    </div>
                                    {part1Type === 'text' ? (
                                        <input type="text" placeholder="اكتب النص أو العنوان..." value={part1Text} onChange={(e) => setPart1Text(e.target.value)} class="w-full border p-2.5 rounded-lg text-sm" />
                                    ) : (
                                        <div class="space-y-2">
                                            <input type="file" accept="image/*" ref={fileInputRef} onChange={handlePart1ImagePick} class="w-full text-xs" />
                                            {part1Image && <img src={part1Image} class="h-20 rounded-lg border" />}
                                        </div>
                                    )}
                                </div>

                                {/* القسم الثاني: اسم + تسجيل صوتي أو رابط */}
                                <div class="space-y-2 p-3 bg-slate-50 rounded-xl">
                                    <span class="text-[11px] font-bold text-slate-500 block">القسم الثاني: اسم مع تسجيل صوتي أو رابط</span>
                                    <input type="text" placeholder="الاسم..." value={part2Name} onChange={(e) => setPart2Name(e.target.value)} class="w-full border p-2.5 rounded-lg text-sm" />
                                    <div class="flex gap-2">
                                        <button onClick={() => setPart2Mode('link')} class={`flex-1 py-2 rounded-lg text-xs font-bold ${part2Mode === 'link' ? 'bg-primary-500 text-white' : 'bg-white text-slate-600 border'}`}>رابط</button>
                                        <button onClick={() => setPart2Mode('audio')} class={`flex-1 py-2 rounded-lg text-xs font-bold ${part2Mode === 'audio' ? 'bg-primary-500 text-white' : 'bg-white text-slate-600 border'}`}>تسجيل صوتي</button>
                                    </div>
                                    {part2Mode === 'link' ? (
                                        <input type="text" placeholder="الرابط..." value={part2Link} onChange={(e) => setPart2Link(e.target.value)} class="w-full border p-2.5 rounded-lg text-sm" />
                                    ) : (
                                        <MediaAttachments image={null} onImageChange={() => {}} audio={part2Audio} onAudioChange={setPart2Audio} hideImage={true} />
                                    )}
                                </div>

                                <div class="flex justify-end gap-2">
                                    <button onClick={() => setIsAdding(false)} class="px-4 py-2 text-slate-500">إلغاء</button>
                                    <button onClick={handleCreateElement} class="bg-primary-500 text-white px-5 py-2 rounded-xl font-bold">حفظ</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // بوابة الدخول: تسجيل الدخول / إنشاء حساب + تحميل البيانات السحابية قبل عرض التطبيق
        // ==========================================
        function AuthGate() {
            const [authState, setAuthState] = useState('loading'); // loading | syncing | ready | signedOut
            const [user, setUser] = useState(null);
            const [authMode, setAuthMode] = useState('login'); // login | signup
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authError, setAuthError] = useState('');
            const [authBusy, setAuthBusy] = useState(false);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); });

            useEffect(() => {
                const unsub = firebase.auth().onAuthStateChanged(async (u) => {
                    if (u) {
                        cloudUid = u.uid;
                        setUser(u);
                        setAuthState('syncing');
                        try {
                            const docSnap = await firebase.firestore().collection('users').doc(u.uid).get();
                            if (docSnap.exists) {
                                const data = docSnap.data();
                                Object.keys(data).forEach(key => {
                                    if (typeof data[key] === 'string') {
                                        try { localStorage.setItem(key, data[key]); } catch (e) { /* تجاهل */ }
                                    }
                                });
                            }
                        } catch (err) {
                            console.error('تعذر تحميل البيانات من السحابة:', err);
                        }
                        setAuthState('ready');
                    } else {
                        cloudUid = null;
                        setUser(null);
                        setAuthState('signedOut');
                    }
                });
                return () => unsub();
            }, []);

            const handleEmailAuth = async () => {
                setAuthError('');
                if (!email.trim() || !password.trim()) { setAuthError('أدخل البريد الإلكتروني وكلمة المرور.'); return; }
                setAuthBusy(true);
                try {
                    if (authMode === 'login') {
                        await firebase.auth().signInWithEmailAndPassword(email.trim(), password);
                    } else {
                        await firebase.auth().createUserWithEmailAndPassword(email.trim(), password);
                    }
                } catch (err) {
                    setAuthError(translateAuthError(err));
                }
                setAuthBusy(false);
            };

            const handleGoogleAuth = async () => {
                setAuthError('');
                setAuthBusy(true);
                try {
                    const provider = new firebase.auth.GoogleAuthProvider();
                    await firebase.auth().signInWithPopup(provider);
                } catch (err) {
                    setAuthError(translateAuthError(err));
                }
                setAuthBusy(false);
            };

            const handleLogout = () => {
                if (!confirm('تسجيل الخروج من التطبيق؟')) return;
                firebase.auth().signOut();
            };

            if (authState === 'loading' || authState === 'syncing') {
                return (
                    <div class="min-h-screen flex items-center justify-center bg-white dark:bg-slate-900">
                        <div class="text-center space-y-3">
                            <div class="w-10 h-10 border-4 border-primary-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
                            <p class="text-sm text-slate-400">{authState === 'syncing' ? 'جارٍ تحميل بياناتك من السحابة...' : 'جارٍ التحقق من الحساب...'}</p>
                        </div>
                    </div>
                );
            }

            if (authState === 'ready') {
                return <App onLogout={handleLogout} userEmail={user ? user.email : ''} />;
            }

            // signedOut: عرض شاشة تسجيل الدخول / إنشاء حساب
            return (
                <div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 p-4">
                    <div class="w-full max-w-sm bg-white dark:bg-slate-800 rounded-3xl p-8 space-y-5 shadow-sm border border-slate-100 dark:border-slate-700">
                        <div class="text-center space-y-1">
                            <img src={window.APP_LOGO} class="w-16 h-16 rounded-2xl mx-auto shadow-sm object-cover" />
                            <h1 class="text-xl font-black text-primary-600 dark:text-primary-500">Study Circle</h1>
                            <p class="text-xs text-slate-400">{authMode === 'login' ? 'سجل دخولك لمتابعة رحلتك' : 'أنشئ حساباً جديداً للبدء'}</p>
                        </div>

                        <div class="flex gap-2 bg-slate-100 dark:bg-slate-700 p-1 rounded-xl">
                            <button onClick={() => { setAuthMode('login'); setAuthError(''); }} class={`flex-1 py-2 rounded-lg text-xs font-bold ${authMode === 'login' ? 'bg-white dark:bg-slate-800 shadow-sm text-primary-600' : 'text-slate-500'}`}>تسجيل الدخول</button>
                            <button onClick={() => { setAuthMode('signup'); setAuthError(''); }} class={`flex-1 py-2 rounded-lg text-xs font-bold ${authMode === 'signup' ? 'bg-white dark:bg-slate-800 shadow-sm text-primary-600' : 'text-slate-500'}`}>حساب جديد</button>
                        </div>

                        <div class="space-y-3">
                            <input type="email" placeholder="البريد الإلكتروني" value={email} onChange={(e) => setEmail(e.target.value)} class="w-full border dark:border-slate-600 dark:bg-slate-700 dark:text-white p-3 rounded-xl text-sm" />
                            <input type="password" placeholder="كلمة المرور" value={password} onChange={(e) => setPassword(e.target.value)} class="w-full border dark:border-slate-600 dark:bg-slate-700 dark:text-white p-3 rounded-xl text-sm" />
                            {authError && <p class="text-xs text-red-500 font-bold">{authError}</p>}
                            <button onClick={handleEmailAuth} disabled={authBusy} class="w-full bg-primary-500 text-white py-3 rounded-xl font-bold text-sm disabled:opacity-50">
                                {authBusy ? 'جارٍ التنفيذ...' : (authMode === 'login' ? 'دخول' : 'إنشاء الحساب')}
                            </button>
                        </div>

                        <div class="flex items-center gap-2">
                            <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                            <span class="text-[11px] text-slate-400">أو</span>
                            <div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div>
                        </div>

                        <button onClick={handleGoogleAuth} disabled={authBusy} class="w-full flex items-center justify-center gap-2 border dark:border-slate-600 py-3 rounded-xl font-bold text-sm text-slate-700 dark:text-slate-200 disabled:opacity-50">
                            <i data-lucide="chrome" class="w-4 h-4"></i> المتابعة عبر جوجل
                        </button>
                    </div>
                </div>
            );
        }

        // Render React Application on Screen
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<AuthGate />);
    </script>
</body>
</html>
